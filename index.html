<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Field Boss - Farm Manager</title>
<style>
  :root{
    --bg:#07130e;
    --ink:#142014;
    --cream:#fff6dd;
    --cream2:#f5e7bd;
    --green:#5da052;
    --green2:#2f7140;
    --gold:#f0bd43;
    --blue:#56a8d5;
    --red:#d26752;
    --panel:rgba(255,248,224,.94);
    --glass:rgba(14,26,17,.72);
    --shadow:0 16px 44px rgba(0,0,0,.30);
    --bottom-clearance:env(safe-area-inset-bottom);
    --nav-bottom:calc(var(--bottom-clearance) + 18px);
    --panel-bottom:calc(var(--bottom-clearance) + 94px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);-webkit-user-select:none;user-select:none}
  body{position:fixed;inset:0}
  canvas#game{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:#67984d;touch-action:none;user-select:none;z-index:1}
  .topbar{position:fixed;left:0;right:0;top:0;padding:calc(env(safe-area-inset-top) + 7px) 8px 6px;z-index:8;pointer-events:none;background:linear-gradient(rgba(7,19,14,.66),rgba(7,19,14,.10),transparent)}
  .top-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;pointer-events:auto}.top-scroll::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;border:1px solid rgba(255,255,255,.16);background:rgba(16,30,19,.78);color:#fff6d5;border-radius:999px;padding:8px 10px;font-size:12px;line-height:1;box-shadow:0 7px 18px rgba(0,0,0,.18);backdrop-filter:blur(10px);white-space:nowrap}
  .pill b{color:#ffe49a}
  .sideControls{position:fixed;right:8px;top:calc(env(safe-area-inset-top) + 62px);z-index:12;display:flex;flex-direction:column;gap:7px;pointer-events:auto}
  .floatBtn{width:42px;height:42px;border-radius:15px;border:1px solid rgba(255,255,255,.14);background:rgba(14,26,17,.76);color:#fff6d5;box-shadow:0 8px 24px rgba(0,0,0,.24);font-weight:900;font-size:17px;backdrop-filter:blur(9px);display:grid;place-items:center;padding:0}
  .panel{position:fixed;left:8px;right:8px;bottom:var(--panel-bottom);z-index:20;background:var(--panel);border:1px solid rgba(85,64,26,.20);border-radius:24px;box-shadow:var(--shadow);max-height:min(56dvh,430px);overflow:hidden;display:flex;flex-direction:column;backdrop-filter:blur(12px);touch-action:auto;pointer-events:auto}
  .panel.minimised{display:none}
  .panelHead{padding:10px 11px 7px;border-bottom:1px solid rgba(82,66,30,.14);background:linear-gradient(135deg,rgba(255,255,255,.26),rgba(243,218,145,.18));display:flex;align-items:center;justify-content:space-between;gap:8px}
  .panelTitle{font-weight:950;font-size:16px;display:flex;align-items:center;gap:7px}.panelSub{font-size:11.5px;color:#60704f;margin-top:2px;line-height:1.2}
  .panelBody{overflow-y:auto;overflow-x:hidden;padding:10px 10px 42px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;pointer-events:auto}.panelBody::-webkit-scrollbar{width:0;height:0}
  .miniBtn{min-height:30px;border-radius:11px;padding:5px 9px;background:#21351f;color:#fff;border:0;font-weight:850;box-shadow:inset 0 -2px rgba(0,0,0,.22)}
  .bottomNav{position:fixed;left:8px;right:8px;bottom:var(--nav-bottom);z-index:30;background:rgba(13,25,16,.82);border:1px solid rgba(255,255,255,.12);border-radius:22px;box-shadow:0 12px 36px rgba(0,0,0,.35);backdrop-filter:blur(12px);display:grid;grid-template-columns:repeat(6,1fr);padding:5px;gap:4px;touch-action:manipulation;pointer-events:auto}
  .navBtn{border:0;border-radius:16px;min-height:52px;background:transparent;color:#e9f2d7;font-weight:800;font-size:10.8px;line-height:1.05;padding:5px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;z-index:2}.navBtn span{font-size:18px}.navBtn.active{background:linear-gradient(180deg,#f2c24c,#dba038);color:#241b0b;box-shadow:inset 0 -2px rgba(0,0,0,.18)}
  button,select{font:inherit;border:0;border-radius:14px;padding:10px 10px;font-weight:850;background:#e8d6a3;color:#23301f;box-shadow:inset 0 -2px rgba(0,0,0,.13);min-height:44px;touch-action:manipulation;cursor:pointer;position:relative;z-index:2}button:active{transform:translateY(1px)}button.primary{background:#5d9a4c;color:white}button.gold{background:#f0bd43;color:#261b08}button.blue{background:#5da9d2;color:white}button.red{background:#c95c4b;color:white}button.dark{background:#21351f;color:#fff}button.ghost{background:rgba(255,255,255,.34);border:1px solid rgba(80,60,26,.16);box-shadow:none}button:disabled{opacity:.45;filter:grayscale(.4)}
  select{width:100%;background:#fff3cf;border:1px solid rgba(83,61,25,.18)}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.full{grid-column:1/-1}.muted{font-size:11.5px;color:#627052;line-height:1.28}.tiny{font-size:10.8px;color:#68765d;line-height:1.22}.section{margin:0 0 11px}.sectionTitle{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#6d6b4c;font-weight:950;margin:2px 0 7px}
  .statGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.stat{background:linear-gradient(180deg,#fff7df,#ecd69e);border:1px solid rgba(95,72,28,.15);border-radius:15px;padding:8px;font-size:11px;color:#675d3e}.stat b{display:block;font-size:15px;color:#22311f;margin-top:1px}.progress{height:8px;border-radius:999px;background:rgba(58,48,26,.18);overflow:hidden;margin-top:4px}.bar{height:100%;width:0;background:linear-gradient(90deg,#5d9a4c,#f0bd43)}
  .cards{display:grid;grid-template-columns:1fr;gap:8px}.card{background:linear-gradient(180deg,#fff8df,#efdda9);border:1px solid rgba(96,72,28,.16);border-radius:18px;padding:8px;display:grid;grid-template-columns:58px 1fr;gap:9px;align-items:center}.card h3{margin:0;font-size:13.5px}.card p{margin:2px 0 6px;font-size:11px;color:#667154;line-height:1.2}.card .price{font-weight:950;color:#21351f}.cardBtns{display:flex;gap:6px;flex-wrap:wrap}.cardBtns button{min-height:32px;padding:6px 9px;font-size:12px;border-radius:11px}.iconBox{width:58px;height:50px;border-radius:15px;background:rgba(32,53,31,.10);border:1px solid rgba(60,48,24,.12);display:grid;place-items:center;overflow:hidden}.miniCanvas{width:58px;height:50px;display:block}
  .vehicleRow,.storeRow,.fieldRow,.staffRow{background:rgba(255,255,255,.35);border:1px solid rgba(93,73,31,.14);border-radius:15px;padding:8px;margin-bottom:7px;display:flex;justify-content:space-between;gap:8px;align-items:center}.vehicleRow b,.storeRow b,.fieldRow b,.staffRow b{display:block;font-size:13px}.tag{display:inline-flex;align-items:center;gap:3px;border-radius:999px;background:rgba(31,53,30,.13);padding:4px 7px;font-size:10.5px;font-weight:850;margin:2px 3px 0 0}.tag.warn{background:rgba(201,92,75,.16);color:#8f3228}.tag.good{background:rgba(92,154,76,.17);color:#2b6a35}.tag.blue{background:rgba(93,169,210,.18);color:#2f6684}
  .toast{position:fixed;left:50%;bottom:calc(var(--bottom-clearance) + 148px);transform:translateX(-50%) translateY(8px);background:rgba(17,30,19,.88);color:#fff3c8;padding:8px 12px;border-radius:999px;font-size:12px;z-index:20;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;box-shadow:0 8px 22px rgba(0,0,0,.22);max-width:78vw;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .log{position:fixed;left:8px;top:calc(env(safe-area-inset-top) + 52px);width:min(310px,calc(100vw - 68px));z-index:6;display:flex;flex-direction:column;gap:4px;pointer-events:none}.log div{background:rgba(255,249,224,.78);border-left:3px solid #e6b843;border-radius:10px;padding:5px 7px;font-size:10.8px;line-height:1.15;box-shadow:0 5px 14px rgba(0,0,0,.13);backdrop-filter:blur(8px)}.log div:nth-child(n+3){display:none}

  .emergencyReset{position:fixed;left:8px;top:calc(env(safe-area-inset-top) + 58px);z-index:40;min-height:34px;border-radius:999px;padding:6px 10px;background:rgba(201,92,75,.92);color:white;font-size:11px;font-weight:950;box-shadow:0 8px 22px rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(9px)}
  .tapShield{position:fixed;inset:0;z-index:0;pointer-events:none}
  .hidden{display:none!important}
  @media(max-width:430px){.panel{max-height:58dvh}.topbar{padding-left:6px;padding-right:6px}.pill{font-size:11.4px;padding:7px 8px}.sideControls{top:calc(env(safe-area-inset-top) + 50px)}.statGrid{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:repeat(2,1fr)}.log{display:none}.panelTitle{font-size:15px}.bottomNav{gap:3px}.navBtn{font-size:10px}.navBtn span{font-size:17px}}
  @media(min-width:800px){.panel{left:auto;right:14px;width:430px;bottom:14px;max-height:calc(100vh - 98px)}.bottomNav{left:14px;right:auto;width:430px;bottom:14px}.sideControls{right:458px;top:calc(env(safe-area-inset-top) + 64px)}.toast{bottom:34px}.topbar{right:460px}.log div:nth-child(n+3){display:block}.cards{grid-template-columns:1fr}.grid3{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="emergencyReset" class="emergencyReset" data-reset="1" type="button">Reset</button>
<div class="topbar">
  <div class="top-scroll">
    <div class="pill">💷 <b id="money">£0</b></div>
    <div class="pill">📅 <b id="date">Day 1</b></div>
    <div class="pill">⏱️ <b id="time">07:00</b></div>
    <div class="pill">🌦️ <b id="weather">Clear</b></div>
    <div class="pill">🏚️ <b id="stores">0t / 0t</b></div>
    <div class="pill">🚜 <b id="fleetTop">0/0 parked</b></div>
    <div class="pill">👷 <b id="staffTop">0 drivers</b></div>
  </div>
</div>
<div class="log" id="log"></div>
<div class="sideControls">
  <button class="floatBtn" id="zoomIn">＋</button>
  <button class="floatBtn" id="zoomOut">－</button>
  <button class="floatBtn" id="homeBtn">⌂</button>
  <button class="floatBtn" id="speedBtn">1×</button>
</div>
<div class="panel" id="panel">
  <div class="panelHead">
    <div><div class="panelTitle" id="panelTitle">🌾 Farm</div><div class="panelSub" id="panelSub">Manual farm management. Pick work, buy capacity, sell produce.</div></div>
    <button class="miniBtn" id="hideBtn">Hide</button>
  </div>
  <div class="panelBody" id="panelBody"></div>
</div>
<nav class="bottomNav" id="bottomNav">
  <button class="navBtn active" data-tab="farm"><span>🏡</span>Farm</button>
  <button class="navBtn" data-tab="field"><span>🌾</span>Field</button>
  <button class="navBtn" data-tab="buy"><span>🛒</span>Buy</button>
  <button class="navBtn" data-tab="inventory"><span>🚜</span>Fleet</button>
  <button class="navBtn" data-tab="market"><span>🏪</span>Stores</button>
  <button class="navBtn" data-tab="staff"><span>👷</span>Staff</button>
</nav>
<div class="toast" id="toast"></div>
<script>
(() => {
'use strict';
const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,last=performance.now(),uiDirty=true,toastTimer=0;
const WORLD={w:10400,h:7200};
const SAVE_KEYS=['field-boss-v7-map-drag-lines','field-boss-v6-phone-tap-fix','field-boss-v5-ui-reset','field-boss-v4-manual-map','field-boss-github-pages-v2','field-boss-github-pages-v1'];
const CURRENT_SAVE=SAVE_KEYS[0];
const FORCE_RESET_FLAG='field-boss-v7-reset-complete';
const BUILD_ID='v7-large-map-drag-lines';
const fmtMoney=n=>'£'+Math.round(n).toLocaleString('en-GB');
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b,c,d)=>Math.hypot(c-a,d-b);
const randSeed=s=>{let t=s+0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296};
const rng=(seed)=>()=>randSeed(seed+=1013904223);
const crops={
  wheat:{name:'Wheat',days:6,seed:260,yield:4.2,price:218,color:'#c3ab45',ripe:'#e6c75d'},
  barley:{name:'Barley',days:5,seed:230,yield:3.8,price:194,color:'#b1ae56',ripe:'#d8be6b'},
  canola:{name:'Canola',days:7,seed:380,yield:3.1,price:346,color:'#d5c43a',ripe:'#f4df48'},
  potato:{name:'Potato',days:8,seed:470,yield:7.5,price:128,color:'#609342',ripe:'#8f8f42'},
  corn:{name:'Corn',days:9,seed:430,yield:6.7,price:176,color:'#5c9842',ripe:'#d1a343'}
};
const jobDefs={
  cultivate:{label:'Cultivate',vehicle:'tractor',cost:12,workSpeed:0.42,rowColor:'#5a3422',need:()=>true,desc:'Turns stubble/fallow into workable soil.'},
  sow:{label:'Sow',vehicle:'tractor',cost:0,workSpeed:0.36,rowColor:'#6c8a3f',need:f=>f.rows.some(r=>r.stage>=1),desc:'Plants the selected crop line by line.'},
  fertilise:{label:'Fertilise',vehicle:'tractor',cost:95,workSpeed:0.40,rowColor:'#79aa4e',need:f=>!!f.crop,desc:'Improves yield by adding nutrients.'},
  spray:{label:'Spray weeds',vehicle:'sprayer',cost:70,workSpeed:0.48,rowColor:'#63b4c9',need:f=>!!f.crop,desc:'Reduces weeds and protects crop quality.'},
  irrigate:{label:'Irrigate',vehicle:'tractor',cost:45,workSpeed:0.46,rowColor:'#5aa7d0',need:f=>!!f.crop,desc:'Boosts moisture during dry spells.'},
  harvest:{label:'Harvest',vehicle:'combine',cost:20,workSpeed:0.32,rowColor:'#d9b753',need:f=>!!f.crop&&f.growth>=1,desc:'Uses a combine to harvest mature rows.'}
};
const buyItems=[
  {id:'tractor_small',cat:'Machine',name:'Utility Tractor',icon:'tractor',cost:15500,desc:'Cheap general-purpose tractor for cultivating, sowing, fertilising and irrigation.',buy(){addVehicle('tractor','Utility Tractor',1.0,15500,'#c84d39')}},
  {id:'tractor_large',cat:'Machine',name:'Big Tractor',icon:'tractor2',cost:34000,desc:'Faster heavy tractor. Great for larger fields.',buy(){addVehicle('tractor','Big Tractor',1.32,34000,'#db5a3d')}},
  {id:'combine',cat:'Machine',name:'Combine Harvester',icon:'combine',cost:42000,desc:'Needed for harvest jobs. Slower but high capacity.',buy(){addVehicle('combine','Combine Harvester',1.0,42000,'#d9a82f')}},
  {id:'sprayer',cat:'Machine',name:'Self-Propelled Sprayer',icon:'sprayer',cost:26000,desc:'Dedicated crop sprayer. Handles weed control faster than a small unit.',buy(){addVehicle('sprayer','Crop Sprayer',1.25,26000,'#348fac')}},
  {id:'truck',cat:'Machine',name:'Grain Lorry',icon:'truck',cost:22000,desc:'Hauls grain to the market. Future versions will use it for delivery contracts.',buy(){addVehicle('truck','Grain Lorry',1.2,22000,'#3f6f98')}},
  {id:'parking',cat:'Yard',name:'Tarmac Parking Bay',icon:'parking',cost:9500,desc:'Adds two equipment spaces and expands the dedicated machinery yard.',buy(){game.upgrades.parkingLevel++; game.capacity.parking+=2; log('Machinery parking expanded.')}},
  {id:'barn',cat:'Yard',name:'Machinery Barn',icon:'barn',cost:18500,desc:'Adds protected parking, more yard space and improves resale value.',buy(){game.upgrades.barns++; game.capacity.parking+=3; log('New machinery barn built.')}},
  {id:'silo',cat:'Storage',name:'Steel Grain Silo',icon:'silo',cost:14000,desc:'Adds 120 tonnes of crop storage.',buy(){game.upgrades.silos++; game.capacity.storage+=120; log('New grain silo installed.')}},
  {id:'silo_up',cat:'Storage',name:'Silo Dryer Upgrade',icon:'silo2',cost:22000,desc:'Adds 180 tonnes of capacity and improves crop value stability.',buy(){game.upgrades.siloLevel++; game.capacity.storage+=180; game.marketBonus+=0.02; log('Silo dryer upgraded.')}},
  {id:'field_pack',cat:'Land',name:'Field Bundle Discount',icon:'field',cost:0,desc:'Buy fields individually from the Fields list. Tap a field on the map to inspect it.',buy(){showTab('field'); toast('Tap unowned fields or buy them from the field list.')}}
];
let game,selectedFieldId=null,activeTab='farm',panelOpen=true;
const camera={x:420,y:620,zoom:.42,min:.12,max:3.4};
const pointers=new Map();let drag={id:null,lastX:0,lastY:0,moved:false,holdVehicle:null};let pinch=null;
let vehicleHoldTimer=null, vehicleDrag=null, suppressTapUntil=0;
const decor={trees:[],meadow:[],rocks:[],flowers:[],hedges:[]};
function rotPoint(x,y,a){const c=Math.cos(a),s=Math.sin(a);return{x:x*c-y*s,y:x*s+y*c}}
function fToW(f,lx,ly){const p=rotPoint(lx,ly,f.rot);return{x:f.x+p.x,y:f.y+p.y}}
function wToF(f,wx,wy){const dx=wx-f.x,dy=wy-f.y;return rotPoint(dx,dy,-f.rot)}
function baseRows(n){return Array.from({length:n},()=>({stage:0,job:null,jobProgress:0}));}
function makeField(id,name,x,y,w,h,rot,owned,price,rows,soil){
  const r=rng(id*9127+3), pts=[], steps=8;
  for(let i=0;i<=steps;i++)pts.push({x:-w/2+w*i/steps,y:-h/2+(r()-.5)*28});
  for(let i=1;i<=steps;i++)pts.push({x:w/2+(r()-.5)*28,y:-h/2+h*i/steps});
  for(let i=1;i<=steps;i++)pts.push({x:w/2-w*i/steps,y:h/2+(r()-.5)*28});
  for(let i=1;i<steps;i++)pts.push({x:-w/2+(r()-.5)*28,y:h/2-h*i/steps});
  return {id,name,x,y,w,h,rot,owned,price,soil,rows:baseRows(rows),edge:pts,crop:null,plannedCrop:'wheat',growth:0,moisture:45+Math.round(r()*35),weeds:8+Math.round(r()*15),nutrition:35+Math.round(r()*28),lastYield:0,quality:1};
}
function initialFields(){
  const list=[];
  const names=['Home Meadow','West Barley','Orchard Flats','Red Gate','Moor View','Dairy Corner','Long Acre','New Close','Fox Hollow','Lower Oats','Brookside West','North Wheat Flat','Mill Pasture','River Bend','Railway Field','Market Garden','Windmill Hill','Canal South','Hilltop Canola','Oak Boundary','Far Ridge West','Far Ridge East','Solar Farm Edge','Old Fen','Stone Wall','South Forty','Golden Hollow','Birch Strip','Mill Lane North','Mill Lane South','Green Bank','Co-op Bottom'];
  const xs=[980,2320,3650,5000,6350,7750,9150];
  const ys=[1820,3120,4520,5940];
  let id=1;
  for(let r=0;r<ys.length;r++){
    for(let c=0;c<xs.length;c++){
      const rr=rng(20000+id*91);
      const w=840+rr()*270+(c%3)*35;
      const h=560+rr()*170+(r%2)*40;
      const rot=(rr()-.5)*.18;
      const owned=id<=4;
      const price=owned?0:Math.round((21000+id*2500+w*h/55)/500)*500;
      const rows=Math.max(16,Math.round(h/32));
      const soils=['loam','clay loam','sandy loam','silt','chalky','heavy clay','rich loam'];
      const f=makeField(id,names[id-1]||`Field ${id}`,xs[c]+(rr()-.5)*85,ys[r]+(rr()-.5)*75,w,h,rot,owned,price,rows,soils[(id+c+r)%soils.length]);
      f.plannedCrop=['wheat','barley','canola','potato','corn'][(id+r+c)%5];
      list.push(f); id++;
    }
  }
  // A few large remote fields beyond the main road grid.
  const extras=[
    ['North Moor Block',1780,6850,1350,620,.05,69000,26,'loam'],
    ['East Fen Block',3920,6840,1400,620,-.04,73500,27,'silt'],
    ['Contractor\'s Triangle',6200,6840,1220,590,.10,66000,24,'sandy loam'],
    ['River Wash',8420,6800,1280,610,-.09,71000,25,'heavy clay']
  ];
  for(const e of extras){const f=makeField(id++,e[0],e[1],e[2],e[3],e[4],e[5],false,e[6],e[7],e[8]); f.plannedCrop=['wheat','barley','canola','corn'][id%4]; list.push(f);}
  list[0].rows.forEach(r=>r.stage=1); list[0].plannedCrop='wheat';
  list[1].rows.forEach(r=>{r.stage=2});list[1].crop='wheat';list[1].plannedCrop='wheat';list[1].growth=.32;list[1].nutrition=50;
  list[2].rows.forEach(r=>{r.stage=2});list[2].crop='barley';list[2].plannedCrop='barley';list[2].growth=.58;list[2].moisture=64;
  list[3].rows.forEach(r=>r.stage=1); list[3].plannedCrop='canola';
  return list;
}
function newGame(){
  return {version:7,money:78000,day:1,hour:7.25,season:0,weather:'Clear',weatherTimer:0,speed:1,marketBonus:0,
    fields:initialFields(), storage:{wheat:0,barley:0,canola:0,potato:0,corn:0,straw:0},
    capacity:{storage:220,parking:7},upgrades:{silos:1,siloLevel:1,parkingLevel:1,barns:0,workshop:0},
    staff:{drivers:3,mechanics:0,agronomists:0},
    vehicles:[
      vehicle(1,'tractor','Tractor 120',720,1165,1.0,17000,'#c64d39'),
      vehicle(2,'combine','Starter Combine',835,1165,.9,36000,'#d6a52f'),
      vehicle(3,'sprayer','Mounted Sprayer',950,1165,.95,19000,'#3a8daa')
    ],
    log:[],prices:{},contracts:[],tutorialSeen:false};
}

function update(dt){
  const scale=[1,2,4,8][game.speed-1]||1;let hours=dt*0.00042*scale;game.hour+=hours;if(game.hour>=24){game.hour-=24;game.day++;newDay();}
  updateWeather(hours);for(const v of game.vehicles)updateVehicle(v,dt*scale);updateCrops(hours);uiDirty=true;
}
function updateWeather(hours){game.weatherTimer-=hours;if(game.weatherTimer<=0){const arr=['Clear','Cloudy','Showers','Sunny','Windy','Dry Spell'];game.weather=arr[Math.floor(Math.random()*arr.length)];game.weatherTimer=8+Math.random()*18;}}
function newDay(){for(const f of game.fields){if(!f.owned)continue;if(f.crop){const c=crops[f.crop];let mod=1;if(game.weather==='Sunny')mod+=.07;if(game.weather==='Showers')mod+=.09;if(game.weather==='Dry Spell')mod-=.11;if(f.moisture<25)mod-=.14;if(f.nutrition>60)mod+=.05;if(f.weeds>40)mod-=.08;f.growth=clamp(f.growth+(1/c.days)*mod,0,1);if(f.growth>=1)f.rows.forEach(r=>{if(r.stage===2)r.stage=3});f.moisture=clamp(f.moisture+(game.weather==='Showers'?20:game.weather==='Dry Spell'?-14:-4),0,100);f.weeds=clamp(f.weeds+2.5-(game.staff.agronomists*.35),0,100);f.nutrition=clamp(f.nutrition-3,0,100);}else{f.weeds=clamp(f.weeds+1,0,100);}}
  if(game.day%4===0)log('Market prices refreshed. Check Stores tab before selling.');saveGame(true);
}
function updateCrops(hours){for(const f of game.fields){if(f.crop&&game.weather==='Dry Spell')f.moisture=clamp(f.moisture-hours*.4,0,100)}}
function updateVehicle(v,dt){if(!v.job)return;const j=v.job, f=game.fields.find(x=>x.id===j.fieldId);if(!f){finishJob(v,false);return;}let target=j.path[j.idx];if(!target){finishJob(v,true);return;}const speed=(target.travel?230:jobDefs[j.type].workSpeed*460)*v.speed*(1+game.staff.mechanics*.03);const step=speed*dt/1000;const d=dist(v.x,v.y,target.x,target.y);if(d<=step){v.x=target.x;v.y=target.y;v.angle=target.a??v.angle;onTarget(v,j,f,target);}
  else{const t=step/d;const ox=v.x,oy=v.y;v.x=lerp(v.x,target.x,t);v.y=lerp(v.y,target.y,t);v.angle=Math.atan2(target.y-oy,target.x-ox);if(target.row!=null&&!target.travel){const row=f.rows[target.row];if(row&&row.job===j.type){const segProg=1-d/(target.segmentDist||d);row.jobProgress=clamp(Math.max(row.jobProgress,(target.progressStart||0)+((target.progressEnd||1)-(target.progressStart||0))*segProg),0,1);}}}
}
function onTarget(v,j,f,target){if(target.row!=null&&!target.travel){const row=f.rows[target.row];if(row){row.job=j.type;row.jobDir=target.rowDir||1;row.jobProgress=target.progressEnd||1;if(target.endRow)completeRow(f,row,j);}}
  j.idx++;if(j.idx>=j.path.length)finishJob(v,true);else{const next=j.path[j.idx];if(next.row!=null&&!next.travel){const row=f.rows[next.row];if(row){row.job=j.type;row.jobDir=next.rowDir||1;row.jobProgress=Math.max(row.jobProgress||0,next.progressStart||0);}}}}
function completeRow(f,row,j){row.job=null;row.jobProgress=0;if(j.type==='cultivate')row.stage=1;if(j.type==='sow')row.stage=2;if(j.type==='fertilise')row.stage=Math.max(row.stage,2);if(j.type==='spray')row.stage=Math.max(row.stage,2);if(j.type==='irrigate')row.stage=Math.max(row.stage,2);if(j.type==='harvest')row.stage=4;}
function finishJob(v,success){const j=v.job,f=game.fields.find(x=>x.id===j.fieldId);if(success&&f){applyJobFieldEffects(f,j.type,j.crop);log(`${v.name} finished ${jobDefs[j.type].label.toLowerCase()} on ${f.name}.`);}v.job=null;v.status='Parked';v.x=v.homeX;v.y=v.homeY;v.angle=0;saveGame(true);uiDirty=true;}
function applyJobFieldEffects(f,type,crop){if(type==='cultivate'){f.crop=null;f.growth=0;f.weeds=clamp(f.weeds-22,0,100)}
 if(type==='sow'){f.crop=crop;f.plannedCrop=crop;f.growth=.02;f.weeds=clamp(f.weeds+4,0,100)}
 if(type==='fertilise'){f.nutrition=clamp(f.nutrition+38,0,100)}
 if(type==='spray'){f.weeds=clamp(f.weeds-55,0,100)}
 if(type==='irrigate'){f.moisture=clamp(f.moisture+42,0,100)}
 if(type==='harvest'&&f.crop){const c=crops[f.crop];let tonnes=f.rows.length*c.yield*(.78+f.growth*.25)*(1+f.nutrition/260)*(1-f.weeds/260);tonnes=Math.max(0,tonnes);const free=Math.max(0,game.capacity.storage-totalStored());const stored=Math.min(free,tonnes);game.storage[f.crop]+=stored;game.storage.straw+=Math.min(game.capacity.storage-totalStored(),stored*.18);f.lastYield=stored;f.crop=null;f.growth=0;f.nutrition=clamp(f.nutrition-18,0,100);f.weeds=clamp(f.weeds+8,0,100);if(stored<tonnes)toast('Storage full — some crop was lost. Buy more silos.');}
}
function buildJobPath(f,type,v){const path=[];let prev={x:v?.x??v?.homeX??720,y:v?.y??v?.homeY??1165};const margin=Math.max(26,Math.min(54,f.w*.045));
  for(let i=0;i<f.rows.length;i++){const dir=i%2===0?1:-1,rowIndex=i,rowH=f.h/f.rows.length;const y=-f.h/2+(i+.5)*rowH;const x0=dir>0?-f.w/2+margin:f.w/2-margin;const x1=dir>0?f.w/2-margin:-f.w/2+margin;const a=fToW(f,x0,y);path.push({...a,travel:true,row:null,a:Math.atan2(a.y-prev.y,a.x-prev.x)});const segments=Math.max(4,Math.ceil((f.w-margin*2)/150));let last=a;for(let k=1;k<=segments;k++){const t=k/segments, lx=lerp(x0,x1,t), wobble=Math.sin((k+i*1.7)*1.8)*Math.min(8,rowH*.22), p=fToW(f,lx,y+wobble);path.push({...p,travel:false,row:rowIndex,rowDir:dir,progressStart:(k-1)/segments,progressEnd:t,segmentDist:dist(last.x,last.y,p.x,p.y),endRow:k===segments,a:Math.atan2(p.y-last.y,p.x-last.x)});last=p;}prev=last;}
  path.push({x:v?.homeX??720,y:v?.homeY??1165,travel:true,row:null,a:0});return path;
}
function requiredJobForField(f,v=null){if(!f)return{ok:false,msg:'No field selected.'};if(!f.owned)return{ok:false,msg:`${f.name} needs buying first.`};
  let type=null,crop=f.plannedCrop||'wheat';
  const busy=game.vehicles.some(x=>x.job&&x.job.fieldId===f.id);if(busy)return{ok:false,msg:`${f.name} already has a machine working.`};
  if(f.crop&&f.growth>=1)type='harvest';
  else if(!f.crop&&f.rows.some(r=>r.stage<1||r.stage===4))type='cultivate';
  else if(!f.crop&&f.rows.some(r=>r.stage>=1))type='sow';
  else if(f.crop&&f.moisture<36)type='irrigate';
  else if(f.crop&&f.weeds>34)type='spray';
  else if(f.crop&&f.nutrition<52)type='fertilise';
  else return{ok:false,msg:f.crop?`${f.name} is growing. No urgent job yet.`:`Set a crop plan or cultivate first.`};
  const def=jobDefs[type];if(v&&v.type!==def.vehicle)return{ok:false,msg:`${def.label} needs a ${def.vehicle}, not this ${v.type}.`};return{ok:true,type,crop,msg:`${def.label} ${type==='sow'?cropName(crop):''}`};
}
function startJobOnField(type,crop,f,v=null){if(!f){toast('Tap/select a field first.');return false;}if(!f.owned){toast('Buy this field before working it.');return false;}const def=jobDefs[type];if(!def){toast('Unknown job.');return false;}if(!def.need(f)){toast('That job is not ready yet.');return false;}if(v&&v.type!==def.vehicle){toast(`${def.label} needs a ${def.vehicle}.`);return false;}if(type==='sow'){crop=crop||f.plannedCrop;if(!crop||!crops[crop]){toast('Choose/set a crop plan first.');return false;}const seedCost=Math.round(crops[crop].seed*(f.rows.length/12));if(game.money<seedCost){toast('Not enough money for seed.');return false;}game.money-=seedCost;f.plannedCrop=crop;}const jobCost=Math.round(def.cost*f.rows.length);if(game.money<jobCost){toast('Not enough cash for this job.');return false;}if(availableDrivers()<=0){toast('Hire more drivers to run more machines.');return false;}if(!v)v=game.vehicles.find(v=>v.type===def.vehicle&&!v.job);if(!v){toast(`No available ${def.vehicle}. Buy one or wait.`);return false;}if(v.job){toast(`${v.name} is already working.`);return false;}game.money-=jobCost;f.rows.forEach(r=>{r.job=null;r.jobProgress=0;r.jobDir=1});const path=buildJobPath(f,type,v);v.job={type,fieldId:f.id,crop,idx:0,path};v.status=def.label;log(`${v.name} started ${def.label.toLowerCase()} on ${f.name}.`);if(path[0]){v.angle=Math.atan2(path[0].y-v.y,path[0].x-v.x)}saveGame(true);uiDirty=true;return true;}
function queueJob(type,crop){const f=selectedField();startJobOnField(type,crop,f,null)}
function setCropPlan(){const f=selectedField();if(!f)return;const val=document.getElementById('cropSelect')?.value||'wheat';if(!crops[val])return;f.plannedCrop=val;toast(`${f.name} plan set to ${cropName(val)}.`);saveGame(true);uiDirty=true;}
function assignVehicleToField(v,f){const req=requiredJobForField(f,v);if(!req.ok){toast(req.msg);return false;}selectedFieldId=f.id;const ok=startJobOnField(req.type,req.crop,f,v);if(ok)toast(`${v.name}: ${req.msg} on ${f.name}`);return ok;}
function addVehicle(type,name,speed,value,color){if(game.vehicles.length>=game.capacity.parking){toast('No parking space. Buy tarmac or a machinery barn first.');return false;}const cost=[...buyItems].find(i=>i.name===name)?.cost||value;if(game.money<cost){toast('Not enough money.');return false;}game.money-=cost;const p=parkingSpot(game.vehicles.length);const id=Math.max(0,...game.vehicles.map(v=>v.id))+1;game.vehicles.push(vehicle(id,type,name,p.x,p.y,speed,value,color));log(`${name} purchased and parked in the machinery yard.`);uiDirty=true;return true;}
function parkingSpot(i){const cols=7;return{x:720+(i%cols)*115,y:1165+Math.floor(i/cols)*110}}
function buyItem(id){const item=buyItems.find(x=>x.id===id);if(!item)return;if(item.id==='field_pack'){item.buy();uiDirty=true;return;}if(game.money<item.cost){toast('Not enough money.');return;}if(['parking','barn','silo','silo_up'].includes(item.id)){game.money-=item.cost;item.buy();saveGame(true);uiDirty=true;return;}item.buy();saveGame(true);}
function sellVehicle(id){const v=game.vehicles.find(x=>x.id===id);if(!v||v.job){toast('Can only sell parked machines.');return;}const price=Math.round(v.value*(0.55-v.wear*.25));game.money+=price;game.vehicles=game.vehicles.filter(x=>x.id!==id);game.vehicles.forEach((v,i)=>{const p=parkingSpot(i);v.homeX=p.x;v.homeY=p.y;if(!v.job){v.x=p.x;v.y=p.y}});log(`${v.name} sold for ${fmtMoney(price)}.`);saveGame(true);uiDirty=true;}
function buyField(id){const f=game.fields.find(x=>x.id===id);if(!f||f.owned)return;if(game.money<f.price){toast('Not enough money to buy that field.');return;}game.money-=f.price;f.owned=true;selectedFieldId=f.id;log(`${f.name} purchased.`);saveGame(true);uiDirty=true;}
function sellCrop(k,amount='all'){const qty=game.storage[k]||0;if(qty<=0){toast('Nothing to sell.');return;}const prices=currentPrices();const sell=amount==='half'?qty/2:qty;game.storage[k]-=sell;const cash=sell*prices[k];game.money+=cash;log(`Sold ${sell.toFixed(1)}t ${crops[k].name} at ${fmtMoney(prices[k])}/t.`);saveGame(true);uiDirty=true;}
function syncPanelState(){const panel=document.getElementById('panel');panel.classList.toggle('minimised',!panelOpen);document.querySelectorAll('.navBtn').forEach(b=>b.classList.toggle('active',panelOpen&&b.dataset.tab===activeTab));}
function setTab(tab){if(panelOpen&&activeTab===tab){panelOpen=false;}else{activeTab=tab;panelOpen=true;}syncPanelState();uiDirty=true;}
function showTab(tab){activeTab=tab;panelOpen=true;syncPanelState();uiDirty=true;}
function hidePanel(){panelOpen=false;syncPanelState();uiDirty=true;toast('Menu hidden. Tap any bottom tab to reopen.')}
function renderUI(){if(!uiDirty)return;uiDirty=false;syncPanelState();document.getElementById('money').textContent=fmtMoney(game.money);document.getElementById('date').textContent=`Day ${game.day}`;document.getElementById('time').textContent=String(Math.floor(game.hour)).padStart(2,'0')+':'+String(Math.floor((game.hour%1)*60)).padStart(2,'0');document.getElementById('weather').textContent=game.weather;document.getElementById('stores').textContent=`${totalStored().toFixed(0)}t / ${game.capacity.storage}t`;document.getElementById('fleetTop').textContent=`${game.vehicles.length}/${game.capacity.parking} spaces`;document.getElementById('staffTop').textContent=`${game.staff.drivers} drivers`;document.getElementById('speedBtn').textContent=([1,2,4,8][game.speed-1]||1)+'×';
  const body=document.getElementById('panelBody'), title=document.getElementById('panelTitle'), sub=document.getElementById('panelSub');

  bindPanelButtons();drawMiniIcons();renderLog();}
function renderFarm(){const working=game.vehicles.filter(v=>v.job).length;return `<div class="section"><div class="statGrid"><div class="stat">Cash<b>${fmtMoney(game.money)}</b></div><div class="stat">Storage<b>${totalStored().toFixed(1)}t / ${game.capacity.storage}t</b><div class="progress"><div class="bar" style="width:${clamp(totalStored()/game.capacity.storage*100,0,100)}%"></div></div></div><div class="stat">Fleet spaces<b>${game.vehicles.length}/${game.capacity.parking}</b></div><div class="stat">Active jobs<b>${working}</b></div></div></div><div class="section"><div class="sectionTitle">Manual controls</div><div class="grid3"><button class="primary" data-tabgo="field">Manage fields</button><button class="gold" data-tabgo="buy">Buy equipment</button><button class="blue" data-tabgo="market">Sell crops</button><button class="ghost" data-repair="1">Repair save</button><button class="ghost" data-hide="1">Hide menu</button><button class="red" data-reset="1">New game</button></div><p class="muted">Auto mode has been removed from the main flow. The game is now about choosing which field gets which machine and when.</p></div><div class="section"><div class="sectionTitle">Recent log</div>${(game.log||[]).slice(0,4).map(l=>`<div class="vehicleRow"><div><b>Day ${l.day}</b><span class="tiny">${l.msg}</span></div></div>`).join('')||'<p class="muted">No activity yet.</p>'}</div>`}
function fieldStatus(f){if(!f.owned)return 'For sale';if(f.crop)return `${cropName(f.crop)} ${(f.growth*100).toFixed(0)}%`;if(f.rows.some(r=>r.stage===1))return 'Cultivated';return 'Fallow'}
function renderFieldTab(){const f=selectedField();let html='';if(f){html+=`<div class="section"><div class="statGrid"><div class="stat">${f.name}<b>${fieldStatus(f)}</b></div><div class="stat">Rows<b>${f.rows.length}</b></div><div class="stat">Moisture<b>${f.moisture.toFixed(0)}%</b><div class="progress"><div class="bar" style="width:${f.moisture}%"></div></div></div><div class="stat">Weeds / Nutrition<b>${f.weeds.toFixed(0)}% / ${f.nutrition.toFixed(0)}%</b></div></div></div>`;if(!f.owned){html+=`<div class="section"><button class="primary full" data-buyfield="${f.id}">Buy ${f.name} - ${fmtMoney(f.price)}</button></div>`}else{html+=`<div class="section"><div class="sectionTitle">Queue field work</div><select id="cropSelect">${Object.keys(crops).map(k=>`<option value="${k}" ${k===(f.plannedCrop||'wheat')?'selected':''}>${crops[k].name} seed</option>`).join('')}</select><button class="ghost full" style="margin-top:7px" data-plancrop="1">Set crop plan for drag-to-field</button><div class="grid2" style="margin-top:7px"><button class="primary" data-job="cultivate">Cultivate</button><button class="primary" data-job="sow">Sow selected crop</button><button class="gold" data-job="fertilise">Fertilise</button><button class="blue" data-job="spray">Spray weeds</button><button class="blue" data-job="irrigate">Irrigate</button><button class="gold" data-job="harvest">Harvest</button></div><p class="muted">Machines now drive thicker visible rows. You can also long-press an idle machine, drag it to a field, and it will start the next sensible job using this crop plan.</p></div>`}}
  html+=`<div class="section"><div class="sectionTitle">All fields</div>${game.fields.map(x=>`<div class="fieldRow"><div><b>${x.owned?'🌾':'🔒'} ${x.name}</b><span class="tiny">${x.soil} • ${fieldStatus(x)} • ${x.rows.length} rows ${x.owned?'':`• ${fmtMoney(x.price)}`}</span></div><div>${x.owned?`<button class="ghost" data-selectfield="${x.id}">View</button>`:`<button class="primary" data-buyfield="${x.id}">Buy</button>`}</div></div>`).join('')}</div>`;return html;}
function renderBuy(){const cats=[...new Set(buyItems.map(i=>i.cat))];return cats.map(cat=>`<div class="section"><div class="sectionTitle">${cat}</div><div class="cards">${buyItems.filter(i=>i.cat===cat).map(i=>`<div class="card"><div class="iconBox"><canvas class="miniCanvas" data-icon="${i.icon}" width="116" height="100"></canvas></div><div><h3>${i.name}</h3><p>${i.desc}</p><div class="cardBtns"><span class="price">${i.cost?fmtMoney(i.cost):'Info'}</span><button class="primary" data-buy="${i.id}">${i.cost?'Buy':'Open'}</button></div></div></div>`).join('')}</div></div>`).join('')}
function renderInventory(){return `<div class="section"><div class="statGrid"><div class="stat">Parking capacity<b>${game.vehicles.length}/${game.capacity.parking}</b><div class="progress"><div class="bar" style="width:${clamp(game.vehicles.length/game.capacity.parking*100,0,100)}%"></div></div></div><div class="stat">Buildings<b>${game.upgrades.barns} barns, ${game.upgrades.parkingLevel} yard bays</b></div></div><p class="muted">Buy tarmac parking or barns before buying too many machines. Parked machines can be sold here.</p></div><div class="section"><div class="sectionTitle">Equipment</div>${game.vehicles.map(v=>`<div class="vehicleRow"><div><b>${v.type==='combine'?'🌽':v.type==='sprayer'?'💦':v.type==='truck'?'🚚':'🚜'} ${v.name}</b><span class="tiny">${v.status} • ${v.type} • resale about ${fmtMoney(v.value*(0.55-v.wear*.25))}</span></div><div>${v.job?'<span class="tag blue">Working</span>':`<button class="red" data-sellvehicle="${v.id}">Sell</button>`}</div></div>`).join('')}</div>`}
function renderMarket(){const prices=currentPrices();return `<div class="section"><div class="statGrid"><div class="stat">Total stored<b>${totalStored().toFixed(1)}t / ${game.capacity.storage}t</b><div class="progress"><div class="bar" style="width:${clamp(totalStored()/game.capacity.storage*100,0,100)}%"></div></div></div><div class="stat">Where to sell<b>Co-op / Mill buyers</b></div></div><p class="muted">Grain and canola sell at the co-op near the village. Potatoes and corn sell through the wholesale yard. Straw is kept for future animal systems.</p></div><div class="section"><div class="sectionTitle">Stores and prices</div>${Object.keys(crops).map(k=>`<div class="storeRow"><div><b>${crops[k].name}</b><span class="tiny">Stored ${game.storage[k].toFixed(1)}t • price ${fmtMoney(prices[k])}/t • buyer: ${k==='potato'||k==='corn'?'Wholesale yard':'Co-op grain buyer'}</span></div><div class="cardBtns"><button class="ghost" data-sellcrop="${k}" data-amount="half">Half</button><button class="primary" data-sellcrop="${k}" data-amount="all">All</button></div></div>`).join('')}<div class="storeRow"><div><b>Straw</b><span class="tiny">Stored ${game.storage.straw.toFixed(1)}t • kept for later livestock/bedding system</span></div></div></div><div class="section"><div class="sectionTitle">Storage upgrades</div><div class="grid2"><button class="gold" data-buy="silo">Buy steel silo</button><button class="gold" data-buy="silo_up">Upgrade dryer</button></div></div>`}
function renderStaff(){const hireCost={drivers:6000,mechanics:8500,agronomists:9500};return `<div class="section"><div class="statGrid"><div class="stat">Available drivers<b>${availableDrivers()} / ${game.staff.drivers}</b></div><div class="stat">Mechanics<b>${game.staff.mechanics}</b></div><div class="stat">Agronomists<b>${game.staff.agronomists}</b></div><div class="stat">Running jobs<b>${game.vehicles.filter(v=>v.job).length}</b></div></div><p class="muted">Drivers limit how many machines can work at once. Mechanics slightly speed work and reduce wear. Agronomists slow weed growth.</p></div><div class="section"><div class="sectionTitle">Hire staff</div>${Object.entries(hireCost).map(([k,c])=>`<div class="staffRow"><div><b>${k==='drivers'?'Driver':k==='mechanics'?'Mechanic':'Agronomist'}</b><span class="tiny">Current: ${game.staff[k]} • cost ${fmtMoney(c)}</span></div><button class="primary" data-hire="${k}">Hire</button></div>`).join('')}</div>`}
function bindPanelButtons(){document.querySelectorAll('#panel button,.bottomNav button,.sideControls button,#emergencyReset').forEach(b=>{if(!b.type)b.type='button';});}
function hire(k){const cost={drivers:6000,mechanics:8500,agronomists:9500}[k];if(game.money<cost){toast('Not enough money.');return;}game.money-=cost;game.staff[k]++;log(`Hired a ${k.slice(0,-1)}.`);saveGame(true);uiDirty=true;}
function drawMiniIcons(){document.querySelectorAll('.miniCanvas').forEach(c=>{const type=c.dataset.icon,x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);x.save();x.translate(c.width/2,c.height/2);x.scale(1.25,1.25);if(type==='tractor'||type==='tractor2')miniTractor(x,type==='tractor2');if(type==='combine')miniCombine(x);if(type==='sprayer')miniSprayer(x);if(type==='truck')miniTruck(x);if(type==='parking')miniParking(x);if(type==='barn')miniBarn(x);if(type==='silo'||type==='silo2')miniSilo(x,type==='silo2');if(type==='field')miniField(x);x.restore();});}
function miniTractor(x,big){x.fillStyle='#1f1f1f';[-18,18].forEach(xx=>[-14,14].forEach(yy=>{x.beginPath();x.ellipse(xx,yy,big?8:7,big?12:10,0,0,Math.PI*2);x.fill()}));x.fillStyle=big?'#d85a3d':'#c54d38';roundMini(x,-24,-16,48,32,7);x.fillStyle='#9dd9e7';roundMini(x,-3,-12,19,24,5);}
function miniCombine(x){x.fillStyle='#333';x.fillRect(-38,-28,76,9);for(let i=-33;i<36;i+=11)x.fillRect(i,-36,3,18);x.fillStyle='#d8a62e';roundMini(x,-30,-15,60,34,8);x.fillStyle='#9fd8e7';roundMini(x,0,-11,20,20,4)}
function miniSprayer(x){x.strokeStyle='#2a6572';x.lineWidth=4;x.beginPath();x.moveTo(-42,-4);x.lineTo(42,-4);x.stroke();x.fillStyle='#388faa';roundMini(x,-22,-14,44,30,8);x.fillStyle='#c7eff8';roundMini(x,0,-10,16,18,4)}
function miniTruck(x){x.fillStyle='#3f6f98';roundMini(x,-34,-14,68,30,7);x.fillStyle='#d6c18b';roundMini(x,5,-11,30,24,4);}
function miniParking(x){x.fillStyle='#999486';roundMini(x,-40,-25,80,50,8);x.fillStyle='rgba(255,255,255,.45)';for(let i=-25;i<=25;i+=25)x.fillRect(i,-20,3,40)}
function miniBarn(x){x.fillStyle='#b86443';roundMini(x,-35,-5,70,36,6);x.fillStyle='#744031';x.beginPath();x.moveTo(-42,-5);x.lineTo(0,-36);x.lineTo(42,-5);x.closePath();x.fill();}
function miniSilo(x,big){x.fillStyle='#d9ddd2';x.fillRect(-16,-24,32,big?58:48);x.beginPath();x.ellipse(0,-24,16,7,0,0,Math.PI*2);x.fill();x.strokeStyle='#8d9489';x.strokeRect(-16,-24,32,big?58:48)}
function miniField(x){x.fillStyle='#8a6a3e';x.beginPath();x.moveTo(-42,-22);x.lineTo(35,-25);x.lineTo(43,20);x.lineTo(-35,25);x.closePath();x.fill();x.strokeStyle='#6b512d';x.stroke();x.strokeStyle='rgba(255,255,255,.25)';for(let y=-15;y<=15;y+=10){x.beginPath();x.moveTo(-36,y);x.lineTo(36,y-2);x.stroke();}}
function roundMini(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();x.fill();}
function centerOnField(f){if(!f)return;camera.x=f.x-W/(2*camera.zoom);camera.y=f.y-H/(2*camera.zoom);boundCamera();}
function hitField(wx,wy){for(let i=game.fields.length-1;i>=0;i--){const f=game.fields[i],p=wToF(f,wx,wy);if(p.x>-f.w/2&&p.x<f.w/2&&p.y>-f.h/2&&p.y<f.h/2)return f;}return null;}
function hitVehicle(wx,wy){let best=null,bd=9999;for(const v of game.vehicles){const d=dist(wx,wy,v.x,v.y);const limit=v.type==='combine'?88:v.type==='sprayer'?78:68;if(d<limit&&d<bd){best=v;bd=d;}}return best;}
function handleTap(x,y){if(performance.now()<suppressTapUntil)return;const w=screenToWorld(x,y);const f=hitField(w.x,w.y);if(f){selectedFieldId=f.id;showTab('field');toast(`${f.name} selected`);return;} }
function cancelVehicleHold(){clearTimeout(vehicleHoldTimer);vehicleHoldTimer=null;}
function pointerDown(e){if(e.target!==canvas)return;if(e.cancelable)e.preventDefault();canvas.setPointerCapture(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pointers.size===1){const w=screenToWorld(e.clientX,e.clientY),hv=hitVehicle(w.x,w.y);drag={id:e.pointerId,lastX:e.clientX,lastY:e.clientY,moved:false,holdVehicle:hv&&!hv.job?hv:null};pinch=null;if(drag.holdVehicle){cancelVehicleHold();vehicleHoldTimer=setTimeout(()=>{if(drag.id===e.pointerId&&drag.holdVehicle&&!drag.moved&&pointers.size===1){vehicleDrag={vehicle:drag.holdVehicle,x:e.clientX,y:e.clientY,field:null,message:'Drag to a field'};panelOpen=false;syncPanelState();toast('Drag this machine onto a field.');}},520);}}else if(pointers.size===2){cancelVehicleHold();vehicleDrag=null;suppressTapUntil=performance.now()+700;const arr=[...pointers.values()];pinch={dist:dist(arr[0].x,arr[0].y,arr[1].x,arr[1].y),zoom:camera.zoom,cx:(arr[0].x+arr[1].x)/2,cy:(arr[0].y+arr[1].y)/2};}}
function pointerMove(e){if(e.cancelable)e.preventDefault();if(!pointers.has(e.pointerId))return;pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(vehicleDrag&&drag.id===e.pointerId){vehicleDrag.x=e.clientX;vehicleDrag.y=e.clientY;const w=screenToWorld(e.clientX,e.clientY);vehicleDrag.field=hitField(w.x,w.y);if(vehicleDrag.field){const r=requiredJobForField(vehicleDrag.field,vehicleDrag.vehicle);vehicleDrag.message=r.ok?r.msg:r.msg;}else vehicleDrag.message='Drop on a field';uiDirty=true;return;}if(pointers.size===2){suppressTapUntil=performance.now()+700;const arr=[...pointers.values()],d=dist(arr[0].x,arr[0].y,arr[1].x,arr[1].y),cx=(arr[0].x+arr[1].x)/2,cy=(arr[0].y+arr[1].y)/2;if(pinch){setZoom(pinch.zoom*(d/pinch.dist),cx,cy);camera.x-= (cx-pinch.cx)/camera.zoom;camera.y-= (cy-pinch.cy)/camera.zoom;pinch.cx=cx;pinch.cy=cy;boundCamera();}return;}if(drag.id===e.pointerId){const dx=e.clientX-drag.lastX,dy=e.clientY-drag.lastY;if(Math.abs(dx)+Math.abs(dy)>3)drag.moved=true;if(drag.moved&&drag.holdVehicle&&!vehicleDrag)cancelVehicleHold();camera.x-=dx/camera.zoom;camera.y-=dy/camera.zoom;drag.lastX=e.clientX;drag.lastY=e.clientY;boundCamera();}}
function pointerUp(e){if(e.cancelable)e.preventDefault();cancelVehicleHold();if(vehicleDrag&&drag.id===e.pointerId){const f=vehicleDrag.field;const v=vehicleDrag.vehicle;vehicleDrag=null;suppressTapUntil=performance.now()+650;if(f)assignVehicleToField(v,f);else toast('No field selected.');pointers.delete(e.pointerId);drag.id=null;uiDirty=true;return;}if(drag.id===e.pointerId&&!drag.moved&&performance.now()>=suppressTapUntil)handleTap(e.clientX,e.clientY);pointers.delete(e.pointerId);if(pointers.size<2)pinch=null;if(pointers.size===0)drag.id=null;}

function setMobileViewportVars(){try{const vv=visualViewport;let extra=0;if(vv){extra=Math.max(0,innerHeight-vv.height-vv.offsetTop);}
  const bottom=Math.max(18,Math.min(92,extra+18));document.documentElement.style.setProperty('--bottom-clearance',bottom+'px');
}catch(e){document.documentElement.style.setProperty('--bottom-clearance','24px');}}
function runUiAction(el,e){if(!el)return false;const now=performance.now();if(el===lastUiTarget&&now-lastUiTap<260)return true;lastUiTap=now;lastUiTarget=el;
  if(el.dataset.tab){setTab(el.dataset.tab);return true;}
  if(el.dataset.tabgo){showTab(el.dataset.tabgo);return true;}
  if(el.dataset.buy){buyItem(el.dataset.buy);return true;}
  if(el.dataset.buyfield){buyField(+el.dataset.buyfield);return true;}
  if(el.dataset.selectfield){selectedFieldId=+el.dataset.selectfield;showTab('field');centerOnField(selectedField());return true;}
  if(el.dataset.plancrop){setCropPlan();return true;}
  if(el.dataset.job){queueJob(el.dataset.job,document.getElementById('cropSelect')?.value);return true;}
  if(el.dataset.sellvehicle){sellVehicle(+el.dataset.sellvehicle);return true;}
  if(el.dataset.sellcrop){sellCrop(el.dataset.sellcrop,el.dataset.amount);return true;}
  if(el.dataset.hire){hire(el.dataset.hire);return true;}
  if(el.dataset.reset){hardReset();return true;}
  if(el.dataset.save){saveGame(false);return true;}
  if(el.dataset.repair){repairSaveNow();return true;}
  if(el.dataset.hide){hidePanel();return true;}
  if(el.id==='zoomIn'){setZoom(camera.zoom*1.18);return true;}
  if(el.id==='zoomOut'){setZoom(camera.zoom/1.18);return true;}
  if(el.id==='homeBtn'){camera.x=420;camera.y=620;camera.zoom=.42;boundCamera();return true;}
  if(el.id==='speedBtn'){game.speed=game.speed%4+1;uiDirty=true;return true;}
  if(el.id==='hideBtn'){hidePanel();return true;}
  return false;}
function handleUiEvent(e){const el=e.target.closest('button,[data-tab],select');if(!el)return;
  if(el.tagName==='SELECT')return;
  const inUi=el.closest('#panel,#bottomNav,.sideControls,#emergencyReset,.topbar');if(!inUi)return;
  e.stopPropagation();
  if(e.type==='touchend'||e.type==='pointerup'||e.type==='click'){if(e.cancelable)e.preventDefault();runUiAction(el,e);}
}
function bindGlobal(){setMobileViewportVars();addEventListener('resize',()=>{setMobileViewportVars();resize();});if(window.visualViewport){visualViewport.addEventListener('resize',setMobileViewportVars);visualViewport.addEventListener('scroll',setMobileViewportVars);}
canvas.addEventListener('pointerdown',pointerDown,{passive:false});canvas.addEventListener('pointermove',pointerMove,{passive:false});canvas.addEventListener('pointerup',pointerUp,{passive:false});canvas.addEventListener('pointercancel',pointerUp,{passive:false});
['panel','bottomNav','topbar'].forEach(id=>{const el=document.getElementById(id);if(el){el.addEventListener('pointerdown',e=>{e.stopPropagation();}, {passive:false});el.addEventListener('touchstart',e=>{e.stopPropagation();}, {passive:true});el.addEventListener('touchmove',e=>{e.stopPropagation();}, {passive:true});}});
document.addEventListener('pointerup',handleUiEvent,true);document.addEventListener('touchend',handleUiEvent,{capture:true,passive:false});document.addEventListener('click',handleUiEvent,true);document.addEventListener('change',e=>{if(e.target&&e.target.id==='cropSelect')setCropPlan();},true);syncPanelState();}
function loop(t){const dt=Math.min(40,t-last);last=t;update(dt);draw();renderUI();requestAnimationFrame(loop)}
window.addEventListener('error',e=>{try{document.getElementById('toast').textContent='Game error: refresh or press Reset';document.getElementById('toast').classList.add('show');}catch(_){} });
function init(){try{document.body.dataset.build=BUILD_ID;}catch(e){} resize();loadGame();generateDecor();bindGlobal();renderLog();if(!game.tutorialSeen){toast('Tap fields, long-press machines, and drag them onto fields.');game.tutorialSeen=true;}requestAnimationFrame(loop)}
init();
})();
</script>
</body>
</html>

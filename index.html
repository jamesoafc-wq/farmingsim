<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Field Boss - Farm Manager</title>
<style>
  :root{
    --cream:#fff4d6; --ink:#172315; --muted:#6e765d; --panel:rgba(24,34,22,.88);
    --panel2:rgba(255,247,218,.94); --green:#5d8f3c; --gold:#efbd4e; --red:#bf5a46;
    --blue:#5ca4cf; --shadow:0 14px 36px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#263622;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}
  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:#6e9d55;touch-action:none;user-select:none}
  .hud{position:fixed;left:0;right:0;top:0;padding:calc(env(safe-area-inset-top) + 8px) 10px 8px;display:flex;gap:8px;align-items:center;justify-content:space-between;pointer-events:none;z-index:5}
  .pill{pointer-events:auto;border:1px solid rgba(255,255,255,.18);background:var(--panel);color:#fff8de;border-radius:999px;padding:8px 10px;box-shadow:var(--shadow);font-size:13px;line-height:1.15;white-space:nowrap;backdrop-filter:blur(8px)}
  .pill strong{color:#ffe39b}
  .topGroup{display:flex;gap:7px;overflow-x:auto;min-width:0;scrollbar-width:none}.topGroup::-webkit-scrollbar{display:none}
  .panel{position:fixed;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom) + 10px);background:var(--panel2);border:2px solid rgba(76,60,27,.2);box-shadow:var(--shadow);border-radius:22px;padding:10px;z-index:6;max-height:42vh;overflow:auto}
  .handle{width:42px;height:4px;border-radius:20px;background:#b79b63;margin:0 auto 8px;opacity:.8}
  .panel h2{font-size:17px;margin:0 0 2px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .panel .small{font-size:12px;color:#596149;margin:2px 0 7px;line-height:1.3}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
  .stat{background:#f6e6b7;border:1px solid rgba(93,75,33,.18);border-radius:12px;padding:7px 6px;text-align:center;font-size:11px;color:#5a5135}.stat b{display:block;color:#26341f;font-size:13px;margin-top:2px}
  .actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
  button,select{font:inherit;border:0;border-radius:13px;padding:10px 8px;font-weight:800;background:#e8d6a2;color:#26341f;box-shadow:inset 0 -2px rgba(0,0,0,.12);min-height:40px}
  button:active{transform:translateY(1px)}
  button.primary{background:#6f9e3f;color:#fff} button.warn{background:#c25f49;color:#fff} button.gold{background:#efbd4e;color:#332511} button.blue{background:#6aaed3;color:#fff} button.dark{background:#394a2e;color:#fff}
  button:disabled{opacity:.45;filter:grayscale(.4)}
  select{background:#fff4d2;border:1px solid rgba(80,65,34,.18);font-weight:700;width:100%}
  .side{position:fixed;right:10px;top:calc(env(safe-area-inset-top) + 66px);display:flex;flex-direction:column;gap:8px;z-index:5}
  .side button{width:48px;height:48px;border-radius:16px;background:rgba(27,38,25,.86);color:#fff;border:1px solid rgba(255,255,255,.17);box-shadow:var(--shadow);font-size:20px;padding:0}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 46vh);transform:translateX(-50%);background:rgba(24,34,22,.92);color:#fff3c8;padding:9px 13px;border-radius:999px;font-size:13px;z-index:9;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;box-shadow:var(--shadow);max-width:86vw;text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .log{position:fixed;left:10px;top:calc(env(safe-area-inset-top) + 66px);width:min(330px,calc(100vw - 78px));pointer-events:none;z-index:4;display:flex;flex-direction:column;gap:6px}.log div{background:rgba(255,248,219,.86);border-left:4px solid #d6a743;border-radius:10px;padding:7px 9px;font-size:12px;box-shadow:0 4px 14px rgba(0,0,0,.12)}
  .hidden{display:none!important}
  .panel.minimized{max-height:76px;overflow:hidden}
  .panel.minimized .stats,.panel.minimized .actions,.panel.minimized .vehicleList,.panel.minimized .small{display:none}
  .vehicleList{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}.vehicleList::-webkit-scrollbar{display:none}.chip{border-radius:999px;padding:6px 9px;background:#efe0b5;font-size:12px;white-space:nowrap;border:1px solid rgba(74,56,20,.12)}
  @media(min-width:800px){.panel{left:auto;width:410px;max-height:calc(100vh - 105px);right:14px;bottom:14px}.side{right:438px}.actions{grid-template-columns:repeat(3,1fr)}.toast{bottom:34px}.hud{right:440px}.log{width:360px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="topGroup">
    <div class="pill">💷 <strong id="money">£0</strong></div>
    <div class="pill">📅 <strong id="date">Day 1</strong></div>
    <div class="pill">🌦️ <strong id="weather">Clear</strong></div>
    <div class="pill">🏚️ Stores <strong id="stores">0t</strong></div>
  </div>
  <div class="pill" id="hint">Tap a field</div>
</div>
<div class="log" id="log"></div>
<div class="side">
  <button id="zoomIn" title="Zoom in">＋</button>
  <button id="zoomOut" title="Zoom out">－</button>
  <button id="homeBtn" title="Centre farm">⌂</button>
  <button id="speedBtn" title="Speed">1×</button>
  <button id="autoBtn" title="Auto manager">🤖</button>
</div>
<div class="panel" id="panel">
  <div class="handle"></div>
  <h2><span id="panelTitle">Field Boss</span><button class="dark" id="collapseBtn" style="min-height:32px;padding:6px 10px">Hide</button></h2>
  <div class="small" id="panelSub">Top-down farming sim. Tap a field, queue a job, then watch the machine work line by line.</div>
  <div class="stats" id="stats"></div>
  <div class="vehicleList" id="fleet"></div>
  <div class="actions" id="actions"></div>
</div>
<div class="toast" id="toast"></div>
<script>
(() => {
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
const WORLD = {w:2600,h:1800};
const SAVE_KEY = 'field-boss-github-pages-v2';
const fmtMoney = n => '£' + Math.round(n).toLocaleString('en-GB');
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
const dist = (a,b,c,d)=>Math.hypot(c-a,d-b);
const rand = seed => { let t = seed += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; };
function seeded(seed){return()=>rand(seed+=1013904223)}
function rotatePoint(x,y,ang){const c=Math.cos(ang),s=Math.sin(ang);return{x:x*c-y*s,y:x*s+y*c}}
function fieldToWorld(f,lx,ly){const p=rotatePoint(lx,ly,f.rot);return{x:f.x+p.x,y:f.y+p.y}}
function worldToField(f,wx,wy){const dx=wx-f.x,dy=wy-f.y;const p=rotatePoint(dx,dy,-f.rot);return{x:p.x,y:p.y}}
const crops = {
  wheat:{name:'Wheat',days:6,seed:340,yield:4.2,price:215,color:'#bfa743',ripe:'#e8c75b'},
  barley:{name:'Barley',days:5,seed:280,yield:3.6,price:190,color:'#b8b35d',ripe:'#d7bd68'},
  canola:{name:'Canola',days:7,seed:420,yield:2.9,price:345,color:'#d9c835',ripe:'#f1de46'},
  potato:{name:'Potato',days:8,seed:550,yield:7.2,price:125,color:'#5c9a46',ripe:'#7a9c47'},
  corn:{name:'Corn',days:9,seed:480,yield:6.5,price:175,color:'#5f9e42',ripe:'#d1a844'}
};
const jobInfo = {
  cultivate:{label:'Cultivating',speed:132,color:'#5f3b24',vehicle:'tractor'},
  sow:{label:'Sowing',speed:118,color:'#5b9e41',vehicle:'tractor'},
  fertilize:{label:'Fertilising',speed:126,color:'#77b95f',vehicle:'tractor'},
  spray:{label:'Spraying',speed:142,color:'#6dbad3',vehicle:'sprayer'},
  harvest:{label:'Harvesting',speed:105,color:'#d8b14d',vehicle:'combine'},
  irrigate:{label:'Irrigating',speed:130,color:'#62aede',vehicle:'tractor'}
};
let game;
const camera = {x:360,y:220,zoom:0.55,min:.35,max:2.75};
const pointers = new Map();
let drag = {active:false,id:null,lastX:0,lastY:0,moved:false};
let pinch = null;
let selectedId = null;
let lastTime = performance.now();
let uiDirty = true;
let toastTimer = 0;
const decor = {trees:[],rocks:[],flowers:[],hedges:[],meadow:[]};
function baseRows(n){return Array.from({length:n},()=>({cultivated:false,sown:false,fertilized:false,sprayed:false,harvested:false,job:null,jobT:0}));}
function makeField(id,name,x,y,w,h,rot,owned,price,rows,soil){
  const f = {id,name,x,y,w,h,rot,owned,price,soil, crop:null,growth:0,moisture:55+Math.random()*25,weeds:8+Math.random()*10, nutrition:35+Math.random()*25, rows:baseRows(rows), lastYield:0};
  const r = seeded(id*887+11); f.edge=[];
  const pts=[]; const steps=7;
  for(let i=0;i<=steps;i++) pts.push({x:-w/2 + w*i/steps, y:-h/2 + (r()-.5)*18});
  for(let i=1;i<=steps;i++) pts.push({x:w/2 + (r()-.5)*18, y:-h/2 + h*i/steps});
  for(let i=1;i<=steps;i++) pts.push({x:w/2 - w*i/steps, y:h/2 + (r()-.5)*18});
  for(let i=1;i<steps;i++) pts.push({x:-w/2 + (r()-.5)*18, y:h/2 - h*i/steps});
  f.edge=pts; return f;
}
function newGame(){
  const fields=[
    makeField(1,'Home Meadow',720,520,420,270,-0.08,true,0,15,'loam'),
    makeField(2,'Mill Lane Wheat',1220,500,520,310,0.07,true,0,17,'clay loam'),
    makeField(3,'Fox Hollow',1740,570,430,250,-0.18,false,15500,14,'sandy loam'),
    makeField(4,'Brookside South',800,980,520,330,0.12,true,0,18,'silt'),
    makeField(5,'Old Orchard',1420,990,390,280,-0.11,false,13500,13,'chalky'),
    makeField(6,'Upper Ridge',1930,970,540,360,0.16,false,23000,20,'heavy clay'),
    makeField(7,'Long Acre',1040,1390,700,310,-0.03,false,30000,19,'loam'),
    makeField(8,'Canal Field',1810,1400,560,300,-0.1,false,26000,17,'sandy'),
  ];
  fields[0].rows.forEach(r=>r.cultivated=true);
  fields[1].rows.forEach(r=>r.cultivated=true);
  fields[3].rows.forEach(r=>{r.cultivated=true;r.sown=true;}); fields[3].crop='barley'; fields[3].growth=.42;
  return {
    money:28000, day:1, hour:7.5, season:0, weather:'Clear', weatherTimer:0, speed:1, auto:false,
    fields, storage:{wheat:0,barley:0,canola:0,potato:0,corn:0,straw:0},
    vehicles:[
      {id:1,type:'tractor',name:'Tractor 120',x:570,y:805,angle:0,status:'Idle',homeX:570,homeY:805,speed:1,job:null,color:'#c54b38'},
      {id:2,type:'combine',name:'Combine TX',x:640,y:865,angle:0,status:'Idle',homeX:640,homeY:865,speed:.92,job:null,color:'#d8a72e'},
      {id:3,type:'sprayer',name:'Crop Sprayer',x:530,y:875,angle:0,status:'Idle',homeX:530,homeY:875,speed:1.08,job:null,color:'#3d8fac'},
      {id:4,type:'truck',name:'Grain Lorry',x:705,y:840,angle:0,status:'Idle',homeX:705,homeY:840,speed:1.18,job:null,color:'#3e6f9a'}
    ],
    log:[], contracts:[], lastContractDay:0, autoTick:0
  };
}
function generateDecor(){
  const r=seeded(91234);
  decor.trees=[]; decor.rocks=[]; decor.flowers=[]; decor.meadow=[]; decor.hedges=[];
  for(let i=0;i<210;i++){
    const x=r()*WORLD.w, y=r()*WORLD.h;
    if((x>480&&x<2220&&y>360&&y<1580) && r()<.6) continue;
    decor.trees.push({x,y,s:12+r()*22,t:r()});
  }
  for(let i=0;i<90;i++) decor.meadow.push({x:r()*WORLD.w,y:r()*WORLD.h,w:60+r()*170,h:30+r()*100,a:r()*Math.PI,c:r()});
  for(let i=0;i<80;i++) decor.rocks.push({x:r()*WORLD.w,y:r()*WORLD.h,s:3+r()*8});
  for(let i=0;i<260;i++) decor.flowers.push({x:r()*WORLD.w,y:r()*WORLD.h,s:1.2+r()*2.4,c:r()});
}
function resize(){
  DPR = Math.min(3, window.devicePixelRatio || 1); W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR); canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(game)); toast('Saved as index.html game state'); }catch(e){ toast('Could not save on this browser'); }
}
function load(){
  try{ const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false; const obj=JSON.parse(raw); game=obj; game.fields.forEach(f=>{ if(!f.edge){const nf=makeField(f.id,f.name,f.x,f.y,f.w,f.h,f.rot,f.owned,f.price,f.rows.length,f.soil);f.edge=nf.edge;} f.rows.forEach(r=>{r.job=null;r.jobT=0}); }); game.vehicles.forEach(v=>{if(v.job) v.job=null; v.status='Idle'}); return true; }catch(e){ return false; }
}
function resetGame(){ localStorage.removeItem(SAVE_KEY); game = newGame(); selectedId=null; uiDirty=true; toast('New farm started'); }
function screenToWorld(sx,sy){return {x:sx/camera.zoom + camera.x, y:sy/camera.zoom + camera.y};}
function worldToScreen(wx,wy){return {x:(wx-camera.x)*camera.zoom, y:(wy-camera.y)*camera.zoom};}
function setZoom(z,cx=W/2,cy=H/2){
  const before=screenToWorld(cx,cy); camera.zoom=clamp(z,camera.min,camera.max); camera.x=before.x - cx/camera.zoom; camera.y=before.y - cy/camera.zoom; boundCamera();
}
function boundCamera(){camera.x=clamp(camera.x,-150,WORLD.w-W/camera.zoom+150);camera.y=clamp(camera.y,-150,WORLD.h-H/camera.zoom+150);}
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }
function log(msg){ game.log.unshift({msg,day:game.day}); game.log=game.log.slice(0,5); renderLog(); }
function renderLog(){ const el=document.getElementById('log'); el.innerHTML=game.log.map(l=>`<div>Day ${l.day}: ${l.msg}</div>`).join(''); }
function fieldPath(f){
  ctx.beginPath(); f.edge.forEach((p,i)=>{ if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); }); ctx.closePath();
}
function drawWorld(){
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.scale(camera.zoom,camera.zoom); ctx.translate(-camera.x,-camera.y);
  drawBackground(); drawRoadsAndYard(); drawFields(); drawBuildings(); drawVehicles(); drawLabels();
  ctx.restore();
}
function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,WORLD.h); g.addColorStop(0,'#7daa5b'); g.addColorStop(.55,'#6f9a4f'); g.addColorStop(1,'#5f8b46'); ctx.fillStyle=g; ctx.fillRect(0,0,WORLD.w,WORLD.h);
  for(const m of decor.meadow){ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.a);ctx.fillStyle=m.c<.33?'rgba(90,132,68,.22)':m.c<.66?'rgba(230,205,98,.12)':'rgba(102,160,88,.15)';ctx.beginPath();ctx.ellipse(0,0,m.w,m.h,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  // stream
  ctx.save(); ctx.strokeStyle='#4e92bd'; ctx.lineWidth=42; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.beginPath(); ctx.moveTo(2140,-30); ctx.bezierCurveTo(2030,250,2240,410,2090,650); ctx.bezierCurveTo(1960,855,2230,1035,2105,1245); ctx.bezierCurveTo(1985,1445,2030,1620,1900,1850); ctx.stroke(); ctx.strokeStyle='rgba(255,255,255,.24)'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(2126,70);ctx.bezierCurveTo(2050,265,2205,430,2070,650);ctx.stroke(); ctx.restore();
  for(const r of decor.rocks){ctx.fillStyle='rgba(82,80,65,.35)';ctx.beginPath();ctx.ellipse(r.x,r.y,r.s*1.4,r.s,.3,0,Math.PI*2);ctx.fill();}
  for(const f of decor.flowers){ctx.fillStyle=f.c<.33?'#eec3d7':f.c<.66?'#f1df78':'#fff2a3';ctx.globalAlpha=.65;ctx.fillRect(f.x,f.y,f.s,f.s);ctx.globalAlpha=1;}
  for(const t of decor.trees) drawTree(t.x,t.y,t.s,t.t);
}
function drawRoadsAndYard(){
  ctx.save();
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle='#8c774f';ctx.lineWidth=62;ctx.beginPath();ctx.moveTo(250,865);ctx.bezierCurveTo(585,815,910,820,1160,890);ctx.bezierCurveTo(1450,970,1620,900,1920,840);ctx.stroke();
  ctx.strokeStyle='#b89e6b';ctx.lineWidth=46;ctx.beginPath();ctx.moveTo(250,865);ctx.bezierCurveTo(585,815,910,820,1160,890);ctx.bezierCurveTo(1450,970,1620,900,1920,840);ctx.stroke();
  ctx.strokeStyle='#775f3e';ctx.lineWidth=48;ctx.beginPath();ctx.moveTo(610,830);ctx.bezierCurveTo(605,705,635,665,705,640);ctx.stroke();ctx.strokeStyle='#b89e6b';ctx.lineWidth=35;ctx.stroke();
  ctx.fillStyle='#b99f70'; roundRect(455,715,350,220,24,true,false); ctx.fillStyle='rgba(84,66,38,.16)'; for(let i=0;i<42;i++){ctx.fillRect(470+(i%8)*42,732+Math.floor(i/8)*35,12,4)}
  ctx.restore();
}
function roundRect(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke();}
function drawTree(x,y,s,t){
  ctx.save();ctx.translate(x,y);ctx.fillStyle='rgba(47,37,22,.25)';ctx.beginPath();ctx.ellipse(2,s*.7,s*.55,s*.22,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#5a3f24';ctx.fillRect(-s*.12,s*.1,s*.24,s*.75);ctx.fillStyle=t<.5?'#375f2e':'#496f32';ctx.beginPath();ctx.arc(0,0,s*.65,0,Math.PI*2);ctx.arc(-s*.38,s*.14,s*.45,0,Math.PI*2);ctx.arc(s*.36,s*.2,s*.46,0,Math.PI*2);ctx.fill();ctx.restore();
}
function drawBuildings(){
  // farmhouse
  ctx.save(); ctx.translate(545,655); ctx.rotate(-.08); ctx.fillStyle='rgba(0,0,0,.18)'; roundRect(-65,35,150,28,12,true,false); ctx.fillStyle='#dec9a1'; roundRect(-70,-42,140,90,8,true,false); ctx.fillStyle='#934d3e'; ctx.beginPath();ctx.moveTo(-82,-42);ctx.lineTo(0,-88);ctx.lineTo(82,-42);ctx.closePath();ctx.fill();ctx.fillStyle='#5e3b2d';ctx.fillRect(-12,7,24,41);ctx.fillStyle='#8ac0db';ctx.fillRect(-50,-16,28,23);ctx.fillRect(26,-16,28,23);ctx.restore();
  // barn
  ctx.save();ctx.translate(700,760);ctx.rotate(.03);ctx.fillStyle='rgba(0,0,0,.18)';roundRect(-76,45,175,32,12,true,false);ctx.fillStyle='#9d332f';roundRect(-84,-54,168,118,6,true,false);ctx.fillStyle='#6d2323';ctx.beginPath();ctx.moveTo(-92,-54);ctx.lineTo(0,-112);ctx.lineTo(92,-54);ctx.closePath();ctx.fill();ctx.strokeStyle='#f3dfbd';ctx.lineWidth=5;ctx.strokeRect(-38,6,76,58);ctx.beginPath();ctx.moveTo(-38,6);ctx.lineTo(38,64);ctx.moveTo(38,6);ctx.lineTo(-38,64);ctx.stroke();ctx.restore();
  // silos
  for(let i=0;i<3;i++){ctx.save();ctx.translate(825+i*44,820);ctx.fillStyle='rgba(0,0,0,.16)';ctx.beginPath();ctx.ellipse(6,46,26,10,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#c6c7be';ctx.fillRect(-18,-42,36,86);ctx.beginPath();ctx.ellipse(0,-42,18,10,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.28)';ctx.fillRect(-12,-35,6,70);ctx.restore();}
  // machinery shed
  ctx.save();ctx.translate(505,845);ctx.rotate(.04);ctx.fillStyle='#735f46';roundRect(-80,-38,160,76,6,true,false);ctx.fillStyle='#4f4438';ctx.fillRect(-62,-20,44,45);ctx.fillRect(4,-20,44,45);ctx.fillStyle='#a88752';ctx.beginPath();ctx.moveTo(-90,-38);ctx.lineTo(90,-38);ctx.lineTo(72,-68);ctx.lineTo(-72,-68);ctx.closePath();ctx.fill();ctx.restore();
  // village/market
  ctx.fillStyle='rgba(180,146,91,.5)'; roundRect(2180,750,250,150,20,true,false); ctx.fillStyle='#c47b52'; roundRect(2215,775,70,65,6,true,false); ctx.fillStyle='#e6d7aa'; roundRect(2310,800,80,78,7,true,false); ctx.fillStyle='#72483c'; ctx.fillRect(2235,812,25,28); ctx.fillRect(2342,833,24,31);

function drawFields(){

}
function fieldAt(wx,wy){
  for(let i=game.fields.length-1;i>=0;i--){const f=game.fields[i]; const p=worldToField(f,wx,wy); if(p.x>-f.w/2&&p.x<f.w/2&&p.y>-f.h/2&&p.y<f.h/2) return f;} return null;
}
function selectField(f){selectedId=f?f.id:null; uiDirty=true; if(f) toast(f.name);}
function selectedField(){return game.fields.find(f=>f.id===selectedId)||null;}
function renderUI(){
  document.getElementById('money').textContent=fmtMoney(game.money); document.getElementById('date').textContent=`${seasonName()} Day ${game.day} ${String(Math.floor(game.hour)).padStart(2,'0')}:00`; document.getElementById('weather').textContent=game.weather; document.getElementById('stores').textContent=canSellTotal().toFixed(1)+'t'; document.getElementById('speedBtn').textContent=game.speed+'×'; document.getElementById('autoBtn').style.background=game.auto?'#6f9e3f':'rgba(27,38,25,.86)';
  const f=selectedField(); const stats=document.getElementById('stats'), actions=document.getElementById('actions'), title=document.getElementById('panelTitle'), sub=document.getElementById('panelSub'), fleet=document.getElementById('fleet');
  fleet.innerHTML=game.vehicles.map(v=>`<span class="chip">${vehicleEmoji(v.type)} ${v.name}: ${v.job?jobInfo[v.job.type]?.label||v.status:'Idle'}</span>`).join('');
  if(!f){ title.textContent='Field Boss'; sub.textContent='Tap a field. Pinch to zoom, drag to pan. Use GitHub Pages with this file named index.html.'; stats.innerHTML=`<div class="stat">Fields<b>${game.fields.filter(x=>x.owned).length}/${game.fields.length}</b></div><div class="stat">Fleet<b>${game.vehicles.length}</b></div><div class="stat">Stored<b>${canSellTotal().toFixed(1)}t</b></div><div class="stat">Auto<b>${game.auto?'On':'Off'}</b></div>`;
    actions.innerHTML=`<button class="primary" data-act="centre">Centre Farm</button><button class="gold" data-act="sell">Sell Stores</button><button class="blue" data-act="save">Save</button><button data-act="buytractor">Buy Tractor</button><button data-act="buysprayer">Buy Sprayer</button><button data-act="buycombine">Buy Combine</button><button class="dark" data-act="auto">Toggle Auto</button><button class="warn" data-act="reset">Reset Farm</button><button data-act="help">Help</button>`; bindActions(); return; }
  title.textContent=f.name; sub.textContent=f.owned ? `${f.soil} soil · ${fieldMiniStatus(f)} · ${f.rows.some(r=>r.job)?'Machine working rows now':'Ready for orders'}` : `Unowned field. Buy it to expand the farm.`;
  stats.innerHTML=`<div class="stat">Crop<b>${f.crop?crops[f.crop].name:'None'}</b></div><div class="stat">Growth<b>${Math.round(f.growth*100)}%</b></div><div class="stat">Moisture<b>${Math.round(f.moisture)}%</b></div><div class="stat">Weeds<b>${Math.round(f.weeds)}%</b></div><div class="stat">Cultivated<b>${Math.round(fieldCompletion(f,'cultivated')*100)}%</b></div><div class="stat">Sown<b>${Math.round(fieldCompletion(f,'sown')*100)}%</b></div><div class="stat">Fertilised<b>${Math.round(fieldCompletion(f,'fertilized')*100)}%</b></div><div class="stat">Harvested<b>${Math.round(fieldCompletion(f,'harvested')*100)}%</b></div>`;
  if(!f.owned){actions.innerHTML=`<button class="primary" data-act="buyfield">Buy Field ${fmtMoney(f.price)}</button><button data-act="centreSel">Centre</button><button data-act="back">Farm Menu</button>`; bindActions(); return;}
  actions.innerHTML=`<button class="primary" data-act="cultivate">Cultivate Lines</button><select id="cropSelect">${Object.keys(crops).map(k=>`<option value="${k}">${crops[k].name} seed ${fmtMoney(crops[k].seed*f.rows.length)}</option>`).join('')}</select><button class="primary" data-act="sow">Sow Crop</button><button class="gold" data-act="fertilize">Fertilise</button><button class="blue" data-act="irrigate">Irrigate</button><button class="blue" data-act="spray">Spray Weeds</button><button class="gold" data-act="harvest">Harvest</button><button data-act="centreSel">Centre</button><button data-act="back">Farm Menu</button><button class="gold" data-act="sell">Sell Stores</button><button class="blue" data-act="save">Save</button><button class="dark" data-act="auto">Toggle Auto</button>`; bindActions();
}
function vehicleEmoji(t){return t==='tractor'?'🚜':t==='combine'?'🌾':t==='sprayer'?'💦':'🚚'}
function bindActions(){ document.querySelectorAll('#actions button').forEach(btn=>btn.onclick=()=>handleAction(btn.dataset.act)); }
function handleAction(act){
  const f=selectedField();
  if(act==='back'){selectedId=null; uiDirty=true; return;} if(act==='centre'){centreFarm();return;} if(act==='centreSel'&&f){centreOn(f.x,f.y);return;} if(act==='save'){save();return;} if(act==='sell'){sellAll();return;} if(act==='reset'){ if(confirm('Reset the farm save?')) resetGame(); return;} if(act==='auto'){game.auto=!game.auto;toast('Auto manager '+(game.auto?'on':'off'));uiDirty=true;return;} if(act==='help'){toast('Pinch to zoom, drag to pan, tap fields, then queue jobs. Vehicles work row by row.');return;}
  if(act==='buytractor'){buyVehicle('tractor');return;} if(act==='buysprayer'){buyVehicle('sprayer');return;} if(act==='buycombine'){buyVehicle('combine');return;}
  if(!f)return; if(act==='buyfield'){startJob(f,'buy');return;} if(act==='cultivate')startJob(f,'cultivate'); if(act==='sow'){const k=document.getElementById('cropSelect')?.value||'wheat';startJob(f,'sow',k);} if(act==='fertilize')startJob(f,'fertilize'); if(act==='spray')startJob(f,'spray'); if(act==='harvest')startJob(f,'harvest'); if(act==='irrigate')startJob(f,'irrigate'); uiDirty=true;
}
function centreOn(x,y){camera.x=x-W/(2*camera.zoom);camera.y=y-H/(2*camera.zoom);boundCamera();}
function centreFarm(){camera.zoom= W<700 ? .48 : .62; centreOn(1290,900);}
function togglePanel(){const p=document.getElementById('panel');p.classList.toggle('minimized');document.getElementById('collapseBtn').textContent=p.classList.contains('minimized')?'Show':'Hide';}
canvas.addEventListener('pointerdown', e=>{canvas.setPointerCapture(e.pointerId); pointers.set(e.pointerId,{x:e.clientX,y:e.clientY}); if(pointers.size===1){drag={active:true,id:e.pointerId,lastX:e.clientX,lastY:e.clientY,moved:false};} if(pointers.size===2){const arr=[...pointers.values()];pinch={startDist:dist(arr[0].x,arr[0].y,arr[1].x,arr[1].y),startZoom:camera.zoom,midX:(arr[0].x+arr[1].x)/2,midY:(arr[0].y+arr[1].y)/2};drag.active=false;} });
canvas.addEventListener('pointermove', e=>{ if(!pointers.has(e.pointerId))return; pointers.set(e.pointerId,{x:e.clientX,y:e.clientY}); if(pointers.size===2){const arr=[...pointers.values()];const d=dist(arr[0].x,arr[0].y,arr[1].x,arr[1].y);const mx=(arr[0].x+arr[1].x)/2,my=(arr[0].y+arr[1].y)/2;if(pinch){setZoom(pinch.startZoom*(d/pinch.startDist),mx,my);} return;} if(drag.active&&drag.id===e.pointerId){const dx=e.clientX-drag.lastX,dy=e.clientY-drag.lastY;if(Math.hypot(dx,dy)>2)drag.moved=true;camera.x-=dx/camera.zoom;camera.y-=dy/camera.zoom;drag.lastX=e.clientX;drag.lastY=e.clientY;boundCamera();} });
canvas.addEventListener('pointerup', endPointer); canvas.addEventListener('pointercancel',endPointer);
function endPointer(e){ const wasDrag=drag.active&&drag.id===e.pointerId; pointers.delete(e.pointerId); if(wasDrag&&!drag.moved){ const w=screenToWorld(e.clientX,e.clientY); selectField(fieldAt(w.x,w.y)); } if(pointers.size<2)pinch=null; if(pointers.size===1){const [id,p]=[...pointers.entries()][0];drag={active:true,id,lastX:p.x,lastY:p.y,moved:false};} else drag.active=false; }
canvas.addEventListener('wheel', e=>{e.preventDefault();setZoom(camera.zoom*(e.deltaY<0?1.08:.92),e.clientX,e.clientY);},{passive:false});
document.getElementById('zoomIn').onclick=()=>setZoom(camera.zoom*1.18);document.getElementById('zoomOut').onclick=()=>setZoom(camera.zoom/1.18);document.getElementById('homeBtn').onclick=centreFarm;document.getElementById('speedBtn').onclick=()=>{const arr=[1,2,4,8];game.speed=arr[(arr.indexOf(game.speed)+1)%arr.length];uiDirty=true;};document.getElementById('autoBtn').onclick=()=>{game.auto=!game.auto;uiDirty=true;toast('Auto manager '+(game.auto?'on':'off'));};document.getElementById('collapseBtn').onclick=togglePanel;
function loop(now){ const dt=Math.min(.08,(now-lastTime)/1000); lastTime=now; update(dt); drawWorld(); if(uiDirty){renderUI();renderLog();uiDirty=false;} requestAnimationFrame(loop); }
window.addEventListener('resize',resize);
resize(); generateDecor(); if(!load()) game=newGame(); centreFarm(); maybeContract(); renderUI(); renderLog(); requestAnimationFrame(loop);
})();
</script>

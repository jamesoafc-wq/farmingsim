<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Field Boss Clean Rebuild v25</title>
<style>
:root{
  --bg:#102114;--cream:#fff4d6;--ink:#172516;--glass:rgba(13,26,15,.82);--gold:#eab946;--green:#4e9b50;--blue:#579dca;--red:#c75b4b;
  --bottom:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);user-select:none;-webkit-user-select:none}
body{position:fixed;inset:0}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:#6d9e50;touch-action:none}
.topbar{position:fixed;left:8px;right:8px;top:calc(env(safe-area-inset-top) + 8px);z-index:5;display:flex;gap:6px;overflow-x:auto;pointer-events:none}
.pill{flex:0 0 auto;background:rgba(16,31,18,.82);color:#fff4d6;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 10px;font-weight:800;font-size:12px;box-shadow:0 6px 20px rgba(0,0,0,.24);backdrop-filter:blur(10px)}
.pill b{color:#ffdf83}
.side{position:fixed;right:8px;top:calc(env(safe-area-inset-top) + 62px);z-index:10;display:flex;flex-direction:column;gap:7px}
.float{width:42px;height:42px;border-radius:15px;border:1px solid rgba(255,255,255,.15);background:rgba(14,27,16,.82);color:#fff4d6;font-weight:950;font-size:18px;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.panel{position:fixed;left:8px;right:8px;bottom:calc(var(--bottom) + 82px);max-height:min(47vh,390px);z-index:20;background:rgba(255,246,220,.96);border:1px solid rgba(70,52,22,.18);border-radius:23px;box-shadow:0 16px 46px rgba(0,0,0,.32);overflow:hidden;display:flex;flex-direction:column;backdrop-filter:blur(12px)}
.panel.hidden{display:none}
.panelHead{padding:10px 12px;border-bottom:1px solid rgba(80,58,22,.12);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(255,255,255,.3),rgba(231,190,80,.18))}
.title{font-weight:950;font-size:16px}.sub{font-size:11.5px;color:#677155;margin-top:2px}
.body{padding:10px 10px 34px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.nav{position:fixed;left:8px;right:8px;bottom:calc(var(--bottom) + 10px);z-index:25;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:6px;background:rgba(13,25,16,.86);border-radius:22px;border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 36px rgba(0,0,0,.34);backdrop-filter:blur(12px)}
.nav button{height:52px;border:0;border-radius:16px;background:transparent;color:#eef7da;font-weight:850;font-size:10.6px;display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center}
.nav button span{font-size:19px}.nav button.active{background:linear-gradient(#efc45c,#d39c31);color:#251b08}
button,select{font:inherit;border:0;border-radius:14px;padding:10px;font-weight:850;background:#e8d6a5;color:#24301e;min-height:43px;box-shadow:inset 0 -2px rgba(0,0,0,.13)}
button.primary{background:#4f9b50;color:#fff}button.gold{background:#eab946;color:#271b06}button.blue{background:#529ed0;color:#fff}button.red{background:#c75b4b;color:#fff}button.dark{background:#20331f;color:#fff}button.ghost{background:rgba(255,255,255,.35);border:1px solid rgba(80,60,26,.15);box-shadow:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.card{background:linear-gradient(#fff7dc,#edd9a4);border:1px solid rgba(90,67,25,.16);border-radius:17px;padding:9px;margin-bottom:8px}
.card b{font-size:14px}.muted{font-size:11.5px;color:#647154;line-height:1.28}.tiny{font-size:10.8px;color:#647154;line-height:1.22}
.statGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.stat{border-radius:15px;background:#fff5d8;border:1px solid rgba(92,68,25,.14);padding:8px;font-size:11px;color:#686141}.stat b{display:block;font-size:15px;color:#172516;margin-top:1px}
.progress{height:8px;background:rgba(50,42,22,.16);border-radius:999px;overflow:hidden;margin-top:5px}.bar{height:100%;background:linear-gradient(90deg,#4f9b50,#eab946)}
.toast{position:fixed;left:50%;bottom:calc(var(--bottom) + 148px);transform:translateX(-50%) translateY(8px);background:rgba(16,31,18,.91);color:#fff4d6;padding:8px 13px;border-radius:999px;font-size:12px;z-index:40;opacity:0;transition:.18s;max-width:82vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:800px){.panel{left:auto;right:14px;width:430px;bottom:14px;max-height:calc(100vh - 110px)}.nav{left:14px;right:auto;width:430px;bottom:14px}.topbar{right:462px}.side{right:458px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="topbar">

<div class="toast" id="toast"></div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,last=performance.now(),toastTimer=0,uiDirty=true;
const WORLD={w:9000,h:6200}, SAVE='field-boss-clean-v25-fs-clean-map';
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), dist=(a,b,c,d)=>Math.hypot(c-a,d-b);
const hashRand=n=>{let t=n+0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296};
const fmt=n=>'£'+Math.round(n).toLocaleString('en-GB');
const camera={x:2300,y:540,z:.36,min:.018,max:8.0};
const atlasImg=new Image(); atlasImg.src='';
const textures={ready:false};
function cropPattern(col,row){const cols=4,rows=3; const cw=atlasImg.width/cols,ch=atlasImg.height/rows; const inset=Math.max(6,Math.min(cw,ch)*0.035); const c=document.createElement('canvas'); c.width=c.height=160; const ictx=c.getContext('2d'); ictx.drawImage(atlasImg,col*cw+inset,row*ch+inset,cw-inset*2,ch-inset*2,0,0,160,160); return ctx.createPattern(c,'repeat')}
function initAtlasTextures(){ textures.ready=false; }
const crops={wheat:{name:'Wheat',price:220,color:'#d9bd59'},barley:{name:'Barley',price:190,color:'#c6b86a'},canola:{name:'Canola',price:340,color:'#f1df46'},potato:{name:'Potato',price:130,color:'#738e43'},corn:{name:'Corn',price:175,color:'#6e9942'}};
const jobs={
 cultivate:{name:'Cultivate',need:'tractor',colour:'#6b3f28',next:'sown',can:f=>f.stage==='fallow'||f.stage==='stubble'},
 sow:{name:'Sow',need:'tractor',colour:'#678743',next:'growing',can:f=>f.stage==='cultivated'},
 spray:{name:'Spray',need:'sprayer',colour:'#62abc4',next:'growing',can:f=>f.stage==='growing'||f.stage==='ripe'},
 harvest:{name:'Harvest',need:'combine',colour:'#d7b653',next:'stubble',can:f=>f.stage==='ripe'}
};
let game,tab='farm',panelOpen=true,selected=null;
let pointers=new Map(),pinch=null,dragging=false,dragStart={x:0,y:0},tapBlock=0;

function poly(points){return points.map(([x,y])=>({x,y}))}
function bbox(p){return {minX:Math.min(...p.map(a=>a.x)),maxX:Math.max(...p.map(a=>a.x)),minY:Math.min(...p.map(a=>a.y)),maxY:Math.max(...p.map(a=>a.y))}}
function centroid(p){let x=0,y=0;for(const a of p){x+=a.x;y+=a.y}return{x:x/p.length,y:y/p.length}}
function pointInPoly(x,y,p){let inside=false;for(let i=0,j=p.length-1;i<p.length;j=i++){const a=p[i],b=p[j];if(((a.y>y)!==(b.y>y))&&(x<(b.x-a.x)*(y-a.y)/(b.y-a.y)+a.x))inside=!inside}return inside}
function pathPoly(p){ctx.beginPath();p.forEach((a,i)=>i?ctx.lineTo(a.x,a.y):ctx.moveTo(a.x,a.y));ctx.closePath()}
function makeRows(field){
  const b=field.bbox, rows=[], n=Math.max(9,Math.round((b.maxY-b.minY)/62));
  for(let i=0;i<n;i++){
    const y=b.minY+(i+.5)*(b.maxY-b.minY)/n, xs=[];
    for(let j=0;j<field.poly.length;j++){
      const a=field.poly[j], c=field.poly[(j+1)%field.poly.length];
      if((a.y<=y&&c.y>y)||(c.y<=y&&a.y>y)){
        const x=a.x+(y-a.y)*(c.x-a.x)/(c.y-a.y); xs.push(x);
      }
    }
    xs.sort((a,b)=>a-b);
    for(let k=0;k<xs.length-1;k+=2)if(xs[k+1]-xs[k]>60)rows.push({a:{x:xs[k]+25,y},b:{x:xs[k+1]-25,y},p:0,job:null,dir:(i%2? -1:1)});
  }
  return rows;
}
function field(id,name,pts,owned=false,price=50000,crop='wheat'){
  const f={id,name,poly:poly(pts),owned,price,crop,planned:crop,stage:owned?'fallow':'locked',growth:0,moisture:55+Math.random()*25,weeds:10,job:null};
  f.bbox=bbox(f.poly); f.centre=centroid(f.poly); f.rows=makeRows(f); return f;
}
function newGame(){
 return {money:82000,day:1,weather:'Clear',storage:{wheat:0,barley:0,canola:0,potato:0,corn:0},fields:[
  // True parcel layout: every field is offset from the road corridor and uses roads/water/yards as boundaries.
  field(1,'F1 North West',[[460,520],[2300,430],[2490,1000],[2050,1660],[1350,1750],[620,1580],[510,980]],true,0,'wheat'),
  field(3,'F3 North Central',[[2640,560],[4720,520],[4910,1520],[2580,1580],[2440,980]],false,62000,'wheat'),
  field(5,'F5 Reservoir Parcel',[[500,2180],[1160,2140],[1390,2300],[1120,2660],[620,2740],[460,2530]],true,0,'potato'),
  field(6,'F6 Central Block',[[3370,2300],[4600,2280],[4780,3380],[3370,3450],[3180,3030],[3210,2460]],true,0,'wheat'),
  field(7,'F7 East Yard Parcel',[[6180,2320],[7420,2240],[7540,3380],[6180,3450],[6100,3000]],false,50000,'barley'),
  field(8,'F8 River Plain',[[7770,2230],[8550,1840],[8520,3350],[7880,3440],[7720,2860]],false,76000,'corn'),
  field(9,'F9 Brook Central',[[3350,3760],[5900,3650],[5960,4980],[3380,5070]],false,70000,'canola'),
  field(10,'F10 Brook East',[[6180,3710],[7540,3610],[7680,5000],[6200,5010]],false,73000,'wheat'),
  field(11,'F11 River Brook',[[7940,3650],[8500,3560],[8460,5120],[7960,5100]],false,73000,'barley'),
  field(12,'F12 Lake South',[[1510,4020],[2880,3980],[3060,5200],[1620,5200],[1240,4680]],false,78000,'corn'),
  field(13,'F13 Bottom West',[[3360,5350],[5900,5280],[5940,6080],[3360,6080]],false,81000,'wheat'),
  field(14,'F14 Bottom Central',[[6180,5320],[7740,5260],[7760,6080],[6180,6080]],false,84000,'potato'),
  field(15,'F15 Bottom East',[[8000,5280],[8500,5300],[8500,6080],[7940,6080]],false,62000,'canola')
 ],vehicles:[
  {id:1,type:'tractor',name:'Tractor 120',x:3780,y:1690,homeX:3780,homeY:1690,angle:0,speed:190,job:null,status:'Parked',colour:'#c84d39'},
  {id:2,type:'combine',name:'Starter Combine',x:4040,y:1690,homeX:4040,homeY:1690,angle:0,speed:145,job:null,status:'Parked',colour:'#d7a832'},
  {id:3,type:'sprayer',name:'Crop Sprayer',x:4300,y:1690,homeX:4300,homeY:1690,angle:0,speed:210,job:null,status:'Parked',colour:'#368eaa'}
 ],log:['Clean rebuild loaded.']};
}
function save(){try{localStorage.setItem(SAVE,JSON.stringify(game))}catch(e){}}
function load(){try{if(new URLSearchParams(location.search).has('reset'))throw 1;const raw=localStorage.getItem(SAVE);if(raw){game=JSON.parse(raw);game.fields.forEach(f=>{f.bbox=bbox(f.poly);f.centre=centroid(f.poly);if(!f.rows)f.rows=makeRows(f);f.rows.forEach(r=>{r.job=null;r.p=0});});game.vehicles.forEach(v=>{v.job=null;v.status='Parked';v.x=v.homeX;v.y=v.homeY});return}}catch(e){}game=newGame();save();}
function resize(){DPR=Math.min(3,devicePixelRatio||1);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);bound()}
function sw(sx,sy){return{x:sx/camera.z+camera.x,y:sy/camera.z+camera.y}}
function setZoom(z,cx=W/2,cy=H/2){const b=sw(cx,cy);camera.z=clamp(z,camera.min,camera.max);camera.x=b.x-cx/camera.z;camera.y=b.y-cy/camera.z;bound()}
function bound(){const vw=W/camera.z,vh=H/camera.z,margin=360;if(vw>=WORLD.w+margin*2)camera.x=(WORLD.w-vw)/2;else camera.x=clamp(camera.x,-margin,WORLD.w-vw+margin);if(vh>=WORLD.h+margin*2)camera.y=(WORLD.h-vh)/2;else camera.y=clamp(camera.y,-margin,WORLD.h-vh+margin)}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),1800)}
function draw(){
 initAtlasTextures();
 ctx.clearRect(0,0,W,H);ctx.save();ctx.scale(camera.z,camera.z);ctx.translate(-camera.x,-camera.y);
 drawBase();drawWater();drawAccessTracks();drawFields();drawRoads();drawYards();drawVehicles();drawLabels();
 ctx.restore();
}
function drawBase(){
 // Clean FS-style overview base: no old tiled overlay, just muted satellite-map terrain.
 ctx.fillStyle='#405b37';ctx.fillRect(0,0,WORLD.w,WORLD.h);
 const washes=[
  [900,850,1750,1050,'rgba(25,43,28,.52)',-.15],[1050,4700,2100,1300,'rgba(31,50,34,.55)',.25],
  [7600,860,1800,980,'rgba(39,59,38,.52)',-.12],[7620,4300,2200,1600,'rgba(50,73,42,.44)',.22],
  [5050,3200,1400,1100,'rgba(26,49,39,.36)',-.55],[3000,5800,1500,720,'rgba(71,86,52,.28)',.12],
  [6350,5200,1600,900,'rgba(57,74,45,.26)',.42]
 ];
 for(const p of washes){ctx.save();ctx.translate(p[0],p[1]);ctx.rotate(p[4]);ctx.fillStyle=p[3];ctx.beginPath();ctx.ellipse(0,0,p[2],p[3]||600,0,0,Math.PI*2);ctx.fill();ctx.restore();}
 for(let i=0;i<780;i++){const x=hashRand(i*17)*WORLD.w,y=hashRand(i*17+5)*WORLD.h,s=55+hashRand(i*17+8)*330;ctx.globalAlpha=.025+hashRand(i*17+9)*.055;ctx.fillStyle=hashRand(i*17+10)>.54?'#8b8b67':'#18321f';ctx.beginPath();ctx.ellipse(x,y,s,s*(.28+hashRand(i+33)*.62),hashRand(i+77)*Math.PI,0,Math.PI*2);ctx.fill();}
 ctx.globalAlpha=1;
 drawForest(520,820,1200,1050,150,1);drawForest(880,4750,1650,1300,210,2);drawForest(7600,900,1600,920,170,3);drawForest(7550,4200,2100,1600,230,4);drawForest(5000,3100,1100,1050,130,5);drawForest(3000,2600,900,900,80,6);drawForest(8350,3100,700,1200,75,7);
}
function drawForest(cx,cy,w,h,count,seed){
 for(let i=0;i<count;i++){const rx=(hashRand(seed*1000+i*3)-.5)*w,ry=(hashRand(seed*1000+i*3+1)-.5)*h;if((rx*rx)/(w*w*.25)+(ry*ry)/(h*h*.25)>1.05)continue;const x=cx+rx,y=cy+ry,r=9+hashRand(seed*1000+i*3+2)*18;ctx.globalAlpha=.55+hashRand(seed+i)*.32;ctx.fillStyle=hashRand(seed+i*11)>.45?'#496f3e':'#284b2e';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.24;ctx.fillStyle='#8aaa61';ctx.beginPath();ctx.arc(x-r*.25,y-r*.25,r*.34,0,Math.PI*2);ctx.fill();}
 ctx.globalAlpha=1;
}
function drawWater(){
 ctx.save();
 ctx.fillStyle='#527f92';ctx.strokeStyle='rgba(18,31,34,.65)';ctx.lineWidth=18;
 pathPoly(poly([[0,3400],[340,3260],[720,3530],[760,4110],[540,4720],[600,6200],[0,6200]]));ctx.fill();ctx.stroke();
 ctx.globalAlpha=.18;ctx.fillStyle='#9fc3cc';for(let i=0;i<34;i++){const x=hashRand(i*3)*720,y=3400+hashRand(i*3+1)*2600;ctx.beginPath();ctx.ellipse(x,y,70+hashRand(i)*130,8+hashRand(i+1)*22,hashRand(i+9)*Math.PI,0,Math.PI*2);ctx.fill();}
 ctx.globalAlpha=1;ctx.lineCap='round';ctx.lineJoin='round';
 ctx.strokeStyle='rgba(18,31,34,.70)';ctx.lineWidth=134;ctx.beginPath();ctx.moveTo(8880,-80);ctx.bezierCurveTo(8640,1220,8890,2400,8660,3520);ctx.bezierCurveTo(8460,4520,8750,5400,8620,6280);ctx.stroke();
 ctx.strokeStyle='#4f8196';ctx.lineWidth=112;ctx.beginPath();ctx.moveTo(8880,-80);ctx.bezierCurveTo(8640,1220,8890,2400,8660,3520);ctx.bezierCurveTo(8460,4520,8750,5400,8620,6280);ctx.stroke();
 ctx.strokeStyle='rgba(180,210,216,.18)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(8800,100);ctx.bezierCurveTo(8680,1100,8810,2300,8660,3440);ctx.stroke();
 ctx.strokeStyle='rgba(16,30,25,.65)';ctx.lineWidth=78;ctx.beginPath();ctx.moveTo(880,3480);ctx.bezierCurveTo(1900,3340,2700,3630,3800,3450);ctx.bezierCurveTo(5120,3220,5980,3640,7000,3470);ctx.bezierCurveTo(7800,3340,8250,3490,8660,3410);ctx.stroke();
 ctx.strokeStyle='#4b7b90';ctx.lineWidth=38;ctx.beginPath();ctx.moveTo(880,3480);ctx.bezierCurveTo(1900,3340,2700,3630,3800,3450);ctx.bezierCurveTo(5120,3220,5980,3640,7000,3470);ctx.bezierCurveTo(7800,3340,8250,3490,8660,3410);ctx.stroke();
 ctx.restore();
}
function fieldStyle(f){
 if(!f.owned)return 'rgba(95,91,75,.80)';
 if(f.stage==='cultivated')return '#4a3b31';
 if(f.stage==='growing')return '#5c6848';
 if(f.stage==='ripe')return '#8b7b58';
 if(f.stage==='stubble')return '#6f6048';
 return '#7a6b56';
}
function drawFields(){
 for(const f of game.fields){
   ctx.save();pathPoly(f.poly);
   ctx.fillStyle=fieldStyle(f);ctx.fill();
   ctx.save();ctx.clip();
   for(let i=0;i<36;i++){const x=f.bbox.minX+hashRand(f.id*1000+i*7)*(f.bbox.maxX-f.bbox.minX),y=f.bbox.minY+hashRand(f.id*1000+i*7+1)*(f.bbox.maxY-f.bbox.minY);if(!pointInPoly(x,y,f.poly))continue;ctx.globalAlpha=.035+hashRand(i+f.id)*.05;ctx.fillStyle=hashRand(i+f.id*4)>.5?'#d9cfa9':'#1d271b';ctx.beginPath();ctx.ellipse(x,y,80+hashRand(i)*210,22+hashRand(i+3)*90,hashRand(i+44)*Math.PI,0,Math.PI*2);ctx.fill();}
   ctx.globalAlpha=1;
   if(f.owned){ctx.globalAlpha=.055;ctx.strokeStyle='rgba(245,240,210,.8)';ctx.lineWidth=2;for(const r of f.rows){ctx.beginPath();ctx.moveTo(r.a.x,r.a.y);ctx.lineTo(r.b.x,r.b.y);ctx.stroke()}ctx.globalAlpha=1;}
   for(const r of f.rows)if(r.job){const a=r.dir>0?r.a:r.b,b=r.dir>0?r.b:r.a,x=a.x+(b.x-a.x)*r.p,y=a.y+(b.y-a.y)*r.p;ctx.strokeStyle=jobs[r.job].colour;ctx.lineWidth=30;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(x,y);ctx.stroke();}
   ctx.restore();
   ctx.lineWidth=(selected===f.id)?9:7;ctx.strokeStyle=(selected===f.id)?'rgba(255,238,145,.90)':'rgba(14,31,18,.92)';ctx.stroke();
   ctx.lineWidth=(selected===f.id)?3:2;ctx.strokeStyle=(selected===f.id)?'rgba(255,255,220,.82)':'rgba(93,122,75,.55)';ctx.stroke();
   ctx.restore();
 }
}
function road(points,w=70,track=false){
 ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
 ctx.strokeStyle=track?'rgba(22,29,22,.78)':'rgba(9,13,12,.92)';ctx.lineWidth=w;ctx.beginPath();points.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.stroke();
 ctx.strokeStyle=track?'#62583f':'#4e554f';ctx.lineWidth=w*.56;ctx.stroke();
 ctx.globalAlpha=track?.12:.10;ctx.strokeStyle='#d1c9a9';ctx.lineWidth=Math.max(2,w*.035);ctx.stroke();ctx.globalAlpha=1;ctx.restore();
}

 // These are short gate/access tracks drawn below the fields. The field fill hides any excess, so tracks meet parcels without visibly driving over them.
 road([[4620,2110],[4380,2440]],26,true);
 road([[6040,2150],[5750,2380]],26,true);
 road([[3180,2080],[2920,2080],[2860,1840]],24,true);
 road([[2200,2140],[1880,2180],[1510,2260]],24,true);
 road([[7560,2840],[7250,2820]],24,true);
 road([[7680,3820],[7150,3820]],24,true);
 road([[6100,4880],[5450,4900]],24,true);
 road([[3240,6080],[3600,5850]],24,true);
}
function drawRoads(){
 // Main estate road: this is the divider. Fields are placed either side of this corridor.
 road([[830,4380],[960,3560],[1280,2760],[2200,2140],[3180,2080],[4620,2110],[6040,2150],[7200,2050],[8720,1400]],92);
 // Yard entrance: short spur only, not a road through the yard.
 road([[3860,2110],[3920,1880]],54);
 // Market loop and approach.
 road([[7200,2050],[7540,1580],[8050,1470],[8520,1180]],56);
 road([[7430,760],[8550,760],[8550,1380],[7430,1380],[7430,760]],34);
 // South field access roads and brook crossings.
 road([[3180,2080],[2860,3060],[2980,3630],[3180,4940],[3240,6080]],50);
 road([[6040,2150],[6040,3020],[6130,3520],[6100,4880],[6040,6080]],50);
 road([[7200,2050],[7560,2840],[7680,3820],[7830,5220],[7860,6080]],46);
 // Reservoir edge access road.
 road([[830,4380],[1510,5160],[2500,5400],[3240,6080]],44);
 // Small field gate tracks are drawn under the field layer by drawAccessTracks(), so they visually stop at field edges.

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();ctx.fill();ctx.stroke&&ctx.stroke()}
function drawYards(){
 ctx.fillStyle='#777b75';ctx.strokeStyle='rgba(12,18,14,.88)';ctx.lineWidth=9;roundRect(3420,980,1450,860,24);
 ctx.globalAlpha=.72;ctx.fillStyle='#5f665f';roundRect(3620,1480,1060,310,16);ctx.globalAlpha=1;
 building(3580,1220,320,170,'#777b78','#393d3b');
 building(4050,1210,350,185,'#80847d','#343733');
 building(4550,1230,250,145,'#8a8b82','#41423d');
 for(let i=0;i<3;i++)silo(4700+i*75,1550);
 ctx.fillStyle='#777b75';ctx.strokeStyle='rgba(12,18,14,.88)';ctx.lineWidth=8;roundRect(7440,780,1080,560,24);
 building(7620,1000,280,150,'#777b78','#3b3f3b');
 building(8060,1000,270,145,'#80877e','#344037');
 building(8400,1020,210,120,'#77746a','#3b352c');
}
function building(x,y,w,h,wall,roof){ctx.save();ctx.translate(x,y);ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(14,h/2+18,w*.48,26,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=wall;ctx.fillRect(-w/2,-h/2,w,h);ctx.fillStyle=roof;ctx.beginPath();ctx.moveTo(-w/2-12,-h/2);ctx.lineTo(0,-h/2-52);ctx.lineTo(w/2+12,-h/2);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(15,18,15,.55)';ctx.lineWidth=4;ctx.strokeRect(-w/2,-h/2,w,h);ctx.restore()}
function silo(x,y){ctx.save();ctx.translate(x,y);ctx.fillStyle='#d7d9d1';ctx.fillRect(-26,-30,52,115);ctx.beginPath();ctx.ellipse(0,-30,26,11,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#8e948b';ctx.strokeRect(-26,-30,52,115);ctx.restore()}
function drawVehicles(){
 const s=clamp(1.15/camera.z,1.25,3.6);
 for(const v of game.vehicles){
   ctx.save();ctx.translate(v.x,v.y);ctx.rotate(v.angle);ctx.scale(s,s);
   ctx.fillStyle='rgba(0,0,0,.24)';ctx.beginPath();ctx.ellipse(8,28,50,18,0,0,Math.PI*2);ctx.fill();
   if(v.type==='tractor'){
     ctx.fillStyle='#1e1e1e';ctx.fillRect(-40,-28,22,56);ctx.fillRect(20,-28,22,56);
     ctx.fillStyle=v.colour;roundVehicle(-34,-23,68,46);ctx.fillStyle='#a9dced';ctx.fillRect(-7,-17,27,34);ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(-30,-17,15,8);
   }else if(v.type==='combine'){
     ctx.fillStyle='#333';ctx.fillRect(-74,-42,148,16);for(let x=-66;x<=66;x+=18)ctx.fillRect(x,-58,5,34);
     ctx.fillStyle=v.colour;roundVehicle(-52,-27,104,58);ctx.fillStyle='#a9dced';ctx.fillRect(2,-22,34,32);ctx.fillStyle='#76552a';ctx.fillRect(48,4,42,9);
   }else{
     ctx.strokeStyle='#24596b';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(-96,-5);ctx.lineTo(96,-5);ctx.stroke();
     ctx.fillStyle=v.colour;roundVehicle(-38,-24,76,50);ctx.fillStyle='#c7f1ff';ctx.fillRect(0,-17,28,30);
   }
   ctx.restore();
   if(v.job){
     ctx.save();const font=Math.max(13,15/camera.z);ctx.font=`900 ${font}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(13,26,15,.88)';const w=Math.max(112/camera.z,ctx.measureText(v.status).width+22/camera.z),h=25/camera.z;ctx.fillRect(v.x-w/2,v.y-(84*s)/camera.z,w,h);ctx.fillStyle='#fff4d6';ctx.fillText(v.status,v.x,v.y-(66*s)/camera.z);ctx.restore();
   }
 }
}
function roundVehicle(x,y,w,h){ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,w,h,8):(ctx.rect(x,y,w,h));ctx.fill()}
function drawLabels(){
 // FS-like overview uses subtle labels, not huge white cartoon text.
 if(camera.z<.13)return;
 ctx.save();
 const fs=Math.max(10,Math.min(18,12/camera.z));ctx.font=`900 ${fs}px system-ui`;ctx.textAlign='center';ctx.fillStyle='rgba(245,239,210,.78)';ctx.strokeStyle='rgba(0,0,0,.65)';ctx.lineWidth=2.5/camera.z;
 for(const f of game.fields){const t=f.name.split(' ')[0];ctx.strokeText(t,f.centre.x,f.centre.y);ctx.fillText(t,f.centre.x,f.centre.y)}
 ctx.font=`900 ${Math.max(13,Math.min(24,16/camera.z))}px system-ui`;ctx.fillStyle='rgba(245,239,210,.88)';ctx.strokeText('Farmyard',4140,910);ctx.fillText('Farmyard',4140,910);ctx.strokeText('Market',8020,675);ctx.fillText('Market',8020,675);
 ctx.restore();
}
function updateVehicle(v,factor){
 if(!v.job)return;const j=v.job;
 if(j.phase==='travel'){moveTo(v,j.tx,j.ty,v.speed*factor);if(dist(v.x,v.y,j.tx,j.ty)<8){j.phase='work';j.row=0;v.status=jobs[j.type].name}} 
 else if(j.phase==='work'){const f=fieldById(j.field);if(!f){finish(v);return}const row=f.rows[j.row];if(!row){completeJob(v,f,j.type);return}row.job=j.type;const a=row.dir>0?row.a:row.b,b=row.dir>0?row.b:row.a;const target={x:a.x+(b.x-a.x)*row.p,y:a.y+(b.y-a.y)*row.p}; if(dist(v.x,v.y,target.x,target.y)>28)moveTo(v,target.x,target.y,v.speed*factor);else{row.p+=0.006*(v.speed/160)*factor;if(row.p>=1){row.p=1;row.job=null;j.row++; if(f.rows[j.row]){const nr=f.rows[j.row],s=nr.dir>0?nr.a:nr.b; j.tx=s.x;j.ty=s.y; v.x=s.x;v.y=s.y}}}}
}
function moveTo(v,x,y,step){const d=dist(v.x,v.y,x,y);if(d<.01)return;const t=Math.min(1,step/d);v.angle=Math.atan2(y-v.y,x-v.x);v.x+=(x-v.x)*t;v.y+=(y-v.y)*t}
function completeJob(v,f,type){f.rows.forEach(r=>{r.p=0;r.job=null});if(type==='cultivate')f.stage='cultivated';if(type==='sow'){f.stage='growing';f.crop=f.planned;f.growth=0}if(type==='spray')f.weeds=Math.max(0,f.weeds-45);if(type==='harvest'){const tonnes=28+Math.random()*22;game.storage[f.crop]=(game.storage[f.crop]||0)+tonnes;f.stage='stubble';f.growth=0;log(`Harvested ${tonnes.toFixed(1)}t ${crops[f.crop].name}`)}finish(v);uiDirty=true;save()}
function finish(v){v.job=null;v.status='Parked';moveTo(v,v.homeX,v.homeY,9999)}
function startJob(type){const f=selectedField();if(!f)return toast('Select a field first');if(!f.owned)return toast('Buy this field first');if(!jobs[type].can(f))return toast('That job is not needed yet');const v=game.vehicles.find(v=>v.type===jobs[type].need&&!v.job);if(!v)return toast('No suitable machine free');const row=f.rows[0], start=row.dir>0?row.a:row.b;v.job={type,field:f.id,phase:'travel',tx:start.x,ty:start.y,row:0};v.status='Driving';toast(`${v.name}: ${jobs[type].name} ${f.name}`);uiDirty=true}
function log(m){game.log.unshift(m);game.log=game.log.slice(0,8)}
function fieldById(id){return game.fields.find(f=>f.id===id)}
function selectedField(){return fieldById(selected)}
function render(){
 document.getElementById('money').textContent=fmt(game.money);document.getElementById('day').textContent='Day '+game.day;document.getElementById('weather').textContent=game.weather;document.getElementById('fleet').textContent=game.vehicles.filter(v=>v.job).length+'/'+game.vehicles.length;const total=Object.values(game.storage).reduce((a,b)=>a+b,0);document.getElementById('store').textContent=total.toFixed(0)+'t';
 document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',panelOpen&&b.dataset.tab===tab));document.getElementById('panel').classList.toggle('hidden',!panelOpen);
 const title=document.getElementById('ptitle'),sub=document.getElementById('psub'),body=document.getElementById('body');
 if(tab==='farm'){title.textContent='🏡 Farm';sub.textContent='Parcel map: fields are fitted around roads/water/yards.';body.innerHTML=`<div class="statGrid"><div class="stat">Cash<b>${fmt(game.money)}</b></div><div class="stat">Fields owned<b>${game.fields.filter(f=>f.owned).length}/${game.fields.length}</b></div><div class="stat">Machines working<b>${game.vehicles.filter(v=>v.job).length}</b></div><div class="stat">Stored crop<b>${total.toFixed(1)}t</b></div></div><div class="card"><b>Why this version is different</b><p class="muted">Roads/water/yards define the land first. Field polygons now stop at road verges and share their long edges with lanes, brook, reservoir or river boundaries.</p></div><div class="grid2"><button class="primary" data-tabgo="field">Manage fields</button><button class="red" data-reset>New game</button></div>`}
 if(tab==='field'){const f=selectedField();title.textContent='🌾 Field';sub.textContent=f?f.name:'Tap a field on the map';body.innerHTML=f?fieldUI(f):`<div class="card"><b>No field selected</b><p class="muted">Tap one of the labelled fields. Pinch/dragging will not select fields accidentally.</p></div>`}
 if(tab==='fleet'){title.textContent='🚜 Fleet';sub.textContent='Machines and current work';body.innerHTML=game.vehicles.map(v=>`<div class="card"><b>${v.type==='combine'?'🌽':v.type==='sprayer'?'💦':'🚜'} ${v.name}</b><p class="muted">${v.status} ${v.job?`• ${jobs[v.job.type].name} ${fieldById(v.job.field).name}`:''}</p></div>`).join('')}
 if(tab==='market'){title.textContent='🏪 Market';sub.textContent='Sell stores';body.innerHTML=Object.keys(crops).map(k=>`<div class="card"><b>${crops[k].name}</b><p class="muted">${(game.storage[k]||0).toFixed(1)}t • ${fmt(crops[k].price)}/t</p><button class="primary" data-sell="${k}">Sell all</button></div>`).join('')}
 if(tab==='buy'){title.textContent='🛒 Buy';sub.textContent='Basic placeholders for this clean rebuild';body.innerHTML=`<div class="card"><b>Next rebuild step</b><p class="muted">Once the map foundation feels right, we can add buyable tractors, barns, silos and generated sprites without fighting the old broken code.</p></div>`}
 bindButtons();uiDirty=false;
}
function fieldUI(f){return `<div class="statGrid"><div class="stat">Status<b>${f.owned?f.stage:'For sale'}</b></div><div class="stat">Crop<b>${crops[f.planned].name}</b></div><div class="stat">Growth<b>${Math.round(f.growth*100)}%</b><div class="progress"><div class="bar" style="width:${Math.round(f.growth*100)}%"></div></div></div><div class="stat">Price<b>${f.owned?'Owned':fmt(f.price)}</b></div></div><div class="card"><b>${f.name}</b><p class="muted">${f.owned?'Queue manual work. The machine paints each row as it crosses the field.':'Buy this field to work it.'}</p>${f.owned?`<select id="cropSel">${Object.keys(crops).map(k=>`<option value="${k}" ${k===f.planned?'selected':''}>${crops[k].name}</option>`).join('')}</select><div class="grid2" style="margin-top:8px"><button class="primary" data-job="cultivate">Cultivate</button><button class="primary" data-job="sow">Sow</button><button class="blue" data-job="spray">Spray</button><button class="gold" data-job="harvest">Harvest</button></div>`:`<button class="primary" data-buyfield="${f.id}">Buy ${fmt(f.price)}</button>`}</div>`}
function bindButtons(){document.querySelectorAll('[data-job]').forEach(b=>b.onclick=()=>startJob(b.dataset.job));document.querySelectorAll('[data-buyfield]').forEach(b=>b.onclick=()=>{const f=fieldById(+b.dataset.buyfield);if(game.money>=f.price){game.money-=f.price;f.owned=true;f.stage='fallow';toast('Bought '+f.name);uiDirty=true;save()}else toast('Not enough money')});document.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>{const k=b.dataset.sell,amt=game.storage[k]||0;if(!amt)return toast('Nothing to sell');game.money+=amt*crops[k].price;game.storage[k]=0;toast('Sold '+crops[k].name);uiDirty=true;save()});const sel=document.getElementById('cropSel');if(sel)sel.onchange=()=>{const f=selectedField();f.planned=sel.value;uiDirty=true;save()};document.querySelectorAll('[data-tabgo]').forEach(b=>b.onclick=()=>showTab(b.dataset.tabgo));document.querySelectorAll('[data-reset]').forEach(b=>b.onclick=()=>{localStorage.removeItem(SAVE);game=newGame();selected=null;camera.x=2300;camera.y=540;camera.z=.36;toast('Fresh game');uiDirty=true;save()})}
function showTab(t){if(tab===t&&panelOpen){panelOpen=false}else{tab=t;panelOpen=true}uiDirty=true}
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button[data-tab]');if(b)showTab(b.dataset.tab)});
document.getElementById('hide').onclick=()=>{panelOpen=false;uiDirty=true};
document.getElementById('zin').onclick=()=>setZoom(camera.z*1.32);document.getElementById('zout').onclick=()=>setZoom(camera.z/1.32);document.getElementById('home').onclick=()=>{camera.x=2300;camera.y=540;camera.z=.36;bound()};
canvas.addEventListener('pointerdown',e=>{if(e.target!==canvas)return;canvas.setPointerCapture(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pointers.size===1){dragStart={x:e.clientX,y:e.clientY};dragging=false}else if(pointers.size===2){const a=[...pointers.values()];pinch={d:dist(a[0].x,a[0].y,a[1].x,a[1].y),z:camera.z,cx:(a[0].x+a[1].x)/2,cy:(a[0].y+a[1].y)/2};tapBlock=Date.now()+450}});
canvas.addEventListener('pointermove',e=>{if(!pointers.has(e.pointerId))return;const old=pointers.get(e.pointerId);pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(pointers.size===2&&pinch){const a=[...pointers.values()],d=dist(a[0].x,a[0].y,a[1].x,a[1].y);setZoom(pinch.z*d/pinch.d,(a[0].x+a[1].x)/2,(a[0].y+a[1].y)/2);tapBlock=Date.now()+450;return}if(pointers.size===1){const dx=e.clientX-old.x,dy=e.clientY-old.y;if(Math.hypot(e.clientX-dragStart.x,e.clientY-dragStart.y)>8)dragging=true;camera.x-=dx/camera.z;camera.y-=dy/camera.z;bound()}});
canvas.addEventListener('pointerup',e=>{pointers.delete(e.pointerId);if(pointers.size<2)pinch=null;if(!dragging&&Date.now()>tapBlock){const w=sw(e.clientX,e.clientY);const f=game.fields.find(f=>pointInPoly(w.x,w.y,f.poly));if(f){selected=f.id;tab='field';panelOpen=true;uiDirty=true}}});
canvas.addEventListener('wheel',e=>{e.preventDefault();setZoom(camera.z*(e.deltaY<0?1.18:1/1.18),e.clientX,e.clientY)},{passive:false});
function loop(now){const dt=Math.min(50,now-last);last=now;try{update(dt)}catch(e){console.error(e)}try{draw()}catch(e){console.error(e)}if(uiDirty)render();requestAnimationFrame(loop)}
addEventListener('resize',resize);load();resize();render();requestAnimationFrame(loop);
})();
